<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<!-- SharePoint: allow full functionality -->
<meta name="ms.teams-channel" content="general" />
<title>CarePathIQ — Market Mapper | Care Continuity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
:root {
  --bg:       #f1f3f7;
  --panel:    #ffffff;
  --border:   #e2e6ed;
  --accent:   #1649c9;
  --accent-h: #0f3498;
  --red:      #dc2626;
  --green:    #16a34a;
  --amber:    #d97706;
  --text:     #0f172a;
  --text-2:   #334155;
  --muted:    #64748b;
  --muted-2:  #94a3b8;
  --navy:     #0d1b3e;
  --header-h: 44px;
  --ctrl-h:   48px;
  --pin-h:    38px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:  0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:  0 8px 24px rgba(0,0,0,.12), 0 3px 8px rgba(0,0,0,.06);
  --radius:   7px;
  --radius-lg:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}

/* ── Header ──────────────────────────────────────────────────────────────── */
#header{
  background:var(--navy);
  height:var(--header-h);
  flex-shrink:0;
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:0;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
  position:relative;
  z-index:10;
}
#header::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,#1649c9,#3b82f6,#06b6d4);
}
.hdr-logo{
  font-family:'DM Mono',monospace;
  font-weight:500;
  font-size:15px;
  letter-spacing:.02em;
  color:#fff;
  display:flex;
  align-items:center;
  gap:0;
}
.hdr-logo .care{color:#93c5fd}
.hdr-logo .path{color:#fff}
.hdr-logo .iq{color:#34d399;font-size:12px;vertical-align:super;margin-left:1px}
.hdr-sep{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 14px}
.hdr-subtitle{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.hdr-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:2px 7px}

/* ── Controls bar ────────────────────────────────────────────────────────── */
#controls{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:0 14px;
  height:var(--ctrl-h);
  flex-shrink:0;
  display:flex;
  gap:8px;
  align-items:center;
  box-shadow:var(--shadow-sm);
  position:relative;
  z-index:500;
}
#controls label{
  display:flex;
  flex-direction:column;
  font-size:9.5px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--muted);
  gap:2px;
}
input,select{
  font-family:'DM Sans',sans-serif;
  font-size:12.5px;
  padding:5px 9px;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  background:#fff;
  color:var(--text);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(22,73,201,.1);
}
input::placeholder{color:var(--muted-2)}

.ctrl-btn{
  font-family:'DM Sans',sans-serif;
  font-size:12.5px;
  font-weight:600;
  padding:6px 16px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
  transition:background .15s, transform .1s, box-shadow .15s;
  box-shadow:0 2px 6px rgba(22,73,201,.3);
  letter-spacing:.01em;
  white-space:nowrap;
}
.ctrl-btn:hover{background:var(--accent-h);box-shadow:0 3px 10px rgba(22,73,201,.4)}
.ctrl-btn:active{transform:translateY(1px)}
.ctrl-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.ctrl-btn.secondary{
  background:transparent;
  color:var(--text-2);
  border:1.5px solid var(--border);
  box-shadow:none;
}
.ctrl-btn.secondary:hover{background:var(--bg);border-color:var(--accent);color:var(--accent)}

/* ── Facility type multi-select ──────────────────────────────────────────── */
.ctrl-ftype-wrap{display:flex;flex-direction:column;gap:2px;position:relative}
.ctrl-ftype-lbl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
#ftypeBtn{
  display:flex;align-items:center;gap:6px;
  padding:5px 9px;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  background:#fff;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:12.5px;
  min-width:140px;
  cursor:pointer;
  transition:border-color .15s, box-shadow .15s;
}
#ftypeBtn:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,73,201,.08)}
.ftypeArrow{margin-left:auto;font-size:9px;color:var(--muted)}
#ftypeMenu{
  display:none;position:fixed;z-index:9999;
  background:#fff;
  border:1.5px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  padding:5px 0;
  min-width:180px;
  animation:fadeIn .12s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
#ftypeMenu.open{display:block}
.ftype-item label{
  display:flex;align-items:center;gap:9px;
  padding:7px 14px;
  cursor:pointer;
  font-size:12.5px;font-weight:400;
  color:var(--text-2);
  text-transform:none;letter-spacing:0;white-space:nowrap;
  transition:background .1s;
}
.ftype-item label:hover{background:#f8fafc}
.ftype-item input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.ftype-divider{border-top:1px solid var(--border);margin:4px 0}
.ftype-actions{display:flex}
.ftype-actions button{
  flex:1;padding:6px;background:none;border:none;
  font-size:11px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:background .1s;
}
.ftype-actions button:first-child{color:var(--accent)}
.ftype-actions button:last-child{color:var(--muted)}
.ftype-actions button:hover{background:#f8fafc}

/* ── Pin bar ─────────────────────────────────────────────────────────────── */
#pinBar{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:5px 14px;
  flex-shrink:0;
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:nowrap;
  overflow-x:auto;
}
/* Each section is a grouped card */
.pin-group{
  display:flex;
  align-items:center;
  gap:7px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:7px;
  padding:4px 10px;
  height:32px;
  box-shadow:var(--shadow-sm);
  flex-shrink:0;
}
.pin-group-lbl{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);
  padding-right:5px;
  border-right:1px solid var(--border);
  margin-right:2px;
  white-space:nowrap;
}
.pin-group label{
  display:flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
}
.pin-group input[type=color]{
  width:24px;height:22px;padding:1px 2px;
  border-radius:4px;cursor:pointer;
  border:1.5px solid var(--border);
  background:none;
  transition:border-color .15s;
}
.pin-group input[type=color]:hover{border-color:var(--accent)}
.pin-group input[type=range]{
  width:68px;cursor:pointer;accent-color:var(--accent);
  vertical-align:middle;
}
.pin-size-val{font-size:10px;color:var(--muted);min-width:20px;font-variant-numeric:tabular-nums}
.pin-upload-lbl{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.pin-upload-lbl input[type=file]{font-size:10px;max-width:120px;color:var(--text)}
.icon-preview{width:22px;height:22px;object-fit:cover;border-radius:4px;border:1px solid var(--border);display:none}
.pin-clear-btn{
  background:none;border:1.5px solid var(--border);border-radius:4px;
  padding:1px 6px;font-size:11px;cursor:pointer;color:var(--muted-2);
  transition:all .15s;line-height:1.4;
}
.pin-clear-btn:hover{background:#fee2e2;color:var(--red);border-color:#fca5a5}

/* ── Error bar ───────────────────────────────────────────────────────────── */
#errorBar{
  display:none;
  background:#fef2f2;
  border-bottom:1px solid #fecaca;
  color:#991b1b;
  font-size:12px;
  font-weight:500;
  padding:7px 16px;
  flex-shrink:0;
}
#errorBar.visible{display:flex;align-items:center;gap:8px}
#errorBar::before{content:'⚠';font-size:13px}

/* ── Main layout ─────────────────────────────────────────────────────────── */
#container{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;min-width:0}

/* ── Right panel ─────────────────────────────────────────────────────────── */
#rightPanel{
  width:315px;flex-shrink:0;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:-2px 0 8px rgba(0,0,0,.04);
}
#tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
  padding:0 6px;
  gap:2px;
}
.tab{
  flex:1;padding:10px 4px 8px;
  text-align:center;
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  cursor:pointer;color:var(--muted);
  border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
  margin-bottom:-1px;
}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--panel)}
.panel{display:none;padding:14px;overflow-y:auto;flex:1;font-size:13px;line-height:1.6}
.panel.active{display:block}

/* ── Panel content ───────────────────────────────────────────────────────── */
.sec{
  font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted-2);
  margin:16px 0 7px;
  display:flex;align-items:center;gap:6px;
}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.sec:first-child{margin-top:0}
.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;
  border-bottom:1px solid var(--border);
  font-size:12.5px;gap:8px;
}
.row:last-child{border-bottom:none}
.row .lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-2)}
.val{font-weight:700;color:var(--accent);white-space:nowrap;font-variant-numeric:tabular-nums}
.val.warn{color:var(--red)}
.val.ok{color:var(--green)}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.02em}
.chip-red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.chip-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.chip-green{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.chip-yellow{background:#fffbeb;color:#b45309;border:1px solid #fde68a}

/* Summary box */
.summary-box{
  background:linear-gradient(135deg,#f0f6ff 0%,#f8faff 100%);
  border:1px solid #bfdbfe;
  border-radius:var(--radius-lg);
  padding:12px 14px;
  font-size:12px;
  line-height:1.75;
  color:#1e3a5f;
  margin-top:4px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}

/* Gauge bar */
.gauge-wrap{margin:4px 0 7px}
.gauge-track{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden}
.gauge-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.empty{color:var(--muted-2);font-size:12px;margin-top:8px;font-style:italic}

/* ── Legend ──────────────────────────────────────────────────────────────── */
#legend{
  position:absolute;bottom:20px;left:10px;z-index:900;
  background:rgba(255,255,255,.97);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:10px 12px;
  font-size:11px;
  max-width:195px;max-height:230px;
  overflow-y:auto;
  box-shadow:var(--shadow-md);
  backdrop-filter:blur(4px);
}
#legend .leg-title{
  font-weight:700;font-size:10px;
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:7px;color:var(--muted);
}
.leg-row{display:flex;align-items:center;gap:7px;padding:3px 0}

/* ── Loader ──────────────────────────────────────────────────────────────── */
#loader{
  display:none;position:absolute;inset:0;
  background:rgba(241,243,247,.88);
  backdrop-filter:blur(3px);
  z-index:9999;
  align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
  font-size:13px;font-weight:600;color:var(--accent);
}
#loader.visible{display:flex}
.spin{
  width:32px;height:32px;
  border:3px solid #dbeafe;
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .65s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Assign tab inputs ───────────────────────────────────────────────────── */
#assignSearch{
  width:100%;padding:6px 9px;
  border:1.5px solid var(--border);border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:12px;margin-bottom:8px;
  background:#fff;color:var(--text);
  transition:border-color .15s;
}
#assignSearch:focus{border-color:var(--accent);outline:none}
.assign-row select{
  font-family:'DM Sans',sans-serif;
  font-size:11.5px;
}

/* ── Competitor filter dropdown (compact, lives in controls bar) ─────────── */
.ctrl-comp-wrap { display:flex; flex-direction:column; gap:2px; position:relative; }
.ctrl-comp-lbl  { font-size:9.5px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
#compFilterBtn {
  display:flex; align-items:center; gap:6px;
  padding:5px 9px;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  background:#fff;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:12.5px;
  min-width:148px;
  cursor:pointer;
  transition:border-color .15s, box-shadow .15s;
}
#compFilterBtn:hover { border-color:var(--accent); box-shadow:0 0 0 3px rgba(22,73,201,.08); }
#compFilterBtn.has-filter { border-color:var(--accent); background:#eff6ff; color:var(--accent); font-weight:600; }
.compFilterArrow { margin-left:auto; font-size:9px; color:var(--muted); }
#compFilterMenu {
  display:none; position:fixed; z-index:9999;
  background:#fff;
  border:1.5px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  padding:5px 0;
  min-width:220px;
  max-height:260px;
  overflow-y:auto;
  animation:fadeIn .12s ease;
}
#compFilterMenu.open { display:block; }
.cfilter-item label {
  display:flex; align-items:center; gap:9px;
  padding:6px 14px;
  cursor:pointer;
  font-size:12px; font-weight:400;
  color:var(--text-2);
  text-transform:none; letter-spacing:0; white-space:nowrap;
  transition:background .1s;
}
.cfilter-item label:hover { background:#f8fafc; }
.cfilter-item input[type=checkbox] { width:13px; height:13px; cursor:pointer; accent-color:var(--accent); flex-shrink:0; }
.cfilter-swatch { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.cfilter-count  { margin-left:auto; font-size:10px; color:var(--muted-2); font-variant-numeric:tabular-nums; }
.cfilter-divider { border-top:1px solid var(--border); margin:4px 0; }
.cfilter-actions { display:flex; }
.cfilter-actions button {
  flex:1; padding:6px; background:none; border:none;
  font-size:11px; font-weight:600; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:background .1s;
}
.cfilter-actions button:first-child { color:var(--accent); }
.cfilter-actions button:last-child  { color:var(--muted); }
.cfilter-actions button:hover { background:#f8fafc; }
.cfilter-focus-row {
  display:flex; align-items:center; gap:8px;
  padding:6px 14px; font-size:12px; color:var(--text-2);
  border-top:1px solid var(--border); margin-top:2px;
}
.cfilter-focus-row label { cursor:pointer; font-weight:600; }
.cfilter-focus-row input[type=checkbox] { accent-color:#d97706; cursor:pointer; }
</style>
</head>
<body>


<div id="header">
  <div class="hdr-logo">
    <span class="care">Care</span><span class="path">Path</span><span class="iq">IQ</span>
  </div>
  <div class="hdr-sep"></div>
  <span class="hdr-subtitle">Dynamic Market Mapper</span>
  <div class="hdr-right">
    <span class="hdr-badge">Care Continuity</span>
  </div>
</div>

<!-- Main search controls -->
<div id="controls">
  <label>ZIP Code
    <input id="zipInput" value="" placeholder="Enter ZIP Code" style="width:90px"/>
  </label>
  <label>Target System
    <input id="targetInput" value="" placeholder="e.g. Mass General Brigham" style="width:190px"/>
  </label>
  <label>Radius
    <select id="radiusSelect">
      <option value="8000">5 miles</option>
      <option value="16000">10 miles</option>
      <option value="24000">15 miles</option>
      <option value="32000">20 miles</option>
      <option value="40000" selected>25 miles</option>
    </select>
  </label>
  <div class="ctrl-ftype-wrap">
    <span class="ctrl-ftype-lbl">Facility Type</span>
    <button type="button" id="ftypeBtn" onclick="toggleFtypeMenu(event)">
      <span id="ftypeSummary">All Types</span><span class="ftypeArrow">▾</span>
    </button>
  </div>
  <!-- Menu lives outside #controls label scope to avoid CSS inheritance -->
  <div id="ftypeMenu">
    <div class="ftype-item"><label><input type="checkbox" value="hospital" checked onchange="updateFtypeSummary()"><span>Hospital</span></label></div>
    <div class="ftype-item"><label><input type="checkbox" value="clinic" checked onchange="updateFtypeSummary()"><span>Clinic</span></label></div>
    <div class="ftype-item"><label><input type="checkbox" value="ed" checked onchange="updateFtypeSummary()"><span>Emergency Dept (ED)</span></label></div>
    <div class="ftype-item"><label><input type="checkbox" value="outpatient" checked onchange="updateFtypeSummary()"><span>Outpatient</span></label></div>
    <div class="ftype-item"><label><input type="checkbox" value="rehab" checked onchange="updateFtypeSummary()"><span>Rehab</span></label></div>
    <div class="ftype-item"><label><input type="checkbox" value="urgent_care" checked onchange="updateFtypeSummary()"><span>Urgent Care</span></label></div>
    <div class="ftype-item"><label><input type="checkbox" value="specialist" checked onchange="updateFtypeSummary()"><span>Specialists</span></label></div>
    <div class="ftype-divider"></div>
    <div class="ftype-actions">
      <button type="button" onclick="setAllFtypes(true)">All</button>
      <button type="button" onclick="setAllFtypes(false)">None</button>
    </div>
  </div>
  <label>Display Mode
    <select id="displayMode">
      <option value="rollup">Roll Up by System</option>
      <option value="individual" selected>Individual Locations</option>
    </select>
  </label>

  <div class="ctrl-comp-wrap" id="compFilterWrap" style="display:none">
    <span class="ctrl-comp-lbl">Competitor Systems</span>
    <button type="button" id="compFilterBtn" onclick="toggleCompFilterMenu(event)">
      <span id="compFilterSummary">All Competitors</span><span class="compFilterArrow">▾</span>
    </button>
  </div>
  <!-- Competitor filter dropdown menu (portal-positioned, appended to body) -->
  <div id="compFilterMenu">
    <div id="compFilterItems"></div>
    <div class="cfilter-divider"></div>
    <div class="cfilter-focus-row">
      <input type="checkbox" id="compFocusChk" onchange="onFocusChkChange(this)"/>
      <label for="compFocusChk">Focus mode (hide others)</label>
    </div>
    <div class="cfilter-divider"></div>
    <div class="cfilter-actions">
      <button onclick="setAllCompFilter(true)">Select All</button>
      <button onclick="setAllCompFilter(false)">Clear</button>
    </div>
  </div>
  <button id="runBtn" class="ctrl-btn" onclick="runSearch()">Analyze Market</button>
  <button id="exportBtn" class="ctrl-btn secondary" onclick="exportReport()" style="display:none" title="Export map + insights as PDF">&#8595; Export PDF</button>
</div>

<!-- Pin customisation bar — grouped sections -->
<div id="pinBar">

  <!-- Target Pin group -->
  <div class="pin-group">
    <span class="pin-group-lbl">Target Pin</span>

// Classify an embedded facility's type from its display name.
// Priority order matters — more specific checks run first.
// Unclassified facilities default to 'clinic' (general care provider).
function classifyEmbeddedType(name) {
  var n = (name || '').toLowerCase();

  // ── Emergency / ED ────────────────────────────────────────────────────────
  if (/\bemergency (care center|department|dept|room|services)\b/.test(n)
   || /\b(emergency center|freestanding ed|stand-alone ed)\b/.test(n)) return 'ed';

  // ── Urgent Care ───────────────────────────────────────────────────────────
  if (/\b(urgent care|walk-?in clinic|express care|immediate care|quick care|same.?day clinic|breeze urgent)\b/.test(n)) return 'urgent_care';

  // ── Rehab / Long-Term Care ────────────────────────────────────────────────
  if (/\b(skilled nursing|nursing home|nursing facility|snf|long.?term care|hospice|inpatient rehab|acute rehab|rehabilitation hospital|rehab hospital|physical therapy center|physical therapy clinic|\bpt clinic\b|occupational therapy center|speech therapy center|cardiac rehab|cardiac rehabilitation|rehab network|rehabilitation network|physical therapy.*rehab|rehab.*physical therapy|\brehabilitation\b.*\bnetwork\b)\b/.test(n)
   || (/\b(physical therapy|rehabilitation|rehab)\b/.test(n) && !/\bhospital\b/.test(n))) return 'rehab';

  // ── Outpatient Procedure / Diagnostic ────────────────────────────────────
  if (/\b(imaging center|radiology center|diagnostic center|infusion center|dialysis center|ambulatory surgery|ambulatory surgical|surgery center|surgical center|outpatient surgery|day surgery|endoscopy center|colonoscopy center|\bcath lab\b)\b/.test(n)) return 'outpatient';

  // ── Hospital — must be a standalone inpatient facility ───────────────────
  // Name must END with hospital, or be "X Hospital" not "Hospital Y Clinic"
  // Explicitly exclude sub-programs named after the hospital system
  if (/\bhospital\b/.test(n)
   && !/\b(hospital (sleep|cardiac rehab|rehabilitation network|multi-specialty|transplant|comprehensive|behavioral|radiology|imaging|lab|pharmacy|group|physicians|associates|clinic|center|department|program|services|outpatient|network|cancer|home|visiting|foundation|auxiliary))\b/.test(n)
   && !/\b(sleep center|rehab|cardiac rehab|imaging|lab|pharmacy|group|physicians|associates|clinic|cancer center|behavioral|program|network|foundation)\b/.test(n)) return 'hospital';

  // ── Specialist ────────────────────────────────────────────────────────────
  if (/\b(cardiol|oncol|neurolog|orthoped|orthopaed|gastroenterol|pulmonol|rheumatol|nephrolog|urolog|endocrinol|hematol|otolaryng|\bent\b|obstetric|gynecol|\bobgyn\b|sports medicine|spine center|spine clinic|pain management|pain center|cancer center|cancer institute|heart center|vascular surgery|thoracic surgery|bariatric|fertility|allerg|immunol|dermatol|neurosurg|hand surgery|shoulder clinic|knee clinic|joint replacement|plastic surg|oral surg|colon|rectal|\biv infusion\b|wound care|sloan|farber|\bmsk\b|\bmdacc\b|kettering|\bDana.Farber\b)\b/.test(n)) return 'specialist';

  // ── Clinic / Primary Care (default for medical practices) ─────────────────
  if (/\b(primary care|family medicine|family practice|family health|internal medicine|general practice|pediatric|\bmd\b|\bdo\b|\bpa-c\b|medical group|physician group|physicians|medical associates|health clinic|community health|federally qualified|fqhc|rural health|\bva clinic\b|veterans|community clinic|neighborhood health|student health|occupational health|employee health|corporate health|telehealth|telemedicine)\b/.test(n)) return 'clinic';

  // ── Default: treat as clinic rather than showing in all type searches ─────
  // This prevents specialty-sounding names (allergy, etc.) from appearing
  // when the user has filtered to hospitals/ED/urgent care only.
  return 'clinic';
}

function getEmbeddedFacilities(selectedTypes) {
  if (typeof EMBEDDED_LOCATIONS === 'undefined' || !EMBEDDED_LOCATIONS.length) return [];
  var typeSet = selectedTypes ? new Set(selectedTypes) : null;
  var ALL_TYPES = ['hospital','clinic','ed','outpatient','rehab','urgent_care','specialist'];
  var allSelected = !typeSet || typeSet.size === ALL_TYPES.length;

  return EMBEDDED_LOCATIONS
    .filter(function(loc) {
      if (allSelected) return true;
      var t = classifyEmbeddedType(loc.n);
      // If we can't classify it, include it in all searches
      if (!t) return true;
      return typeSet.has(t);
    })
    .map(function(loc) {
      return {
        id:   loc.id,
        type: 'excel',
        lat:  loc.lat,
        lon:  loc.lon,
        dom:  loc.dom || '',
        tags: {
          name:     loc.n    || '',
          address:  loc.addr || '',
          city:     loc.city || '',
          state:    loc.st   || '',
          postcode: loc.zip  || ''
        },
        _embeddedSystem: loc.sys || '',
        _facType: classifyEmbeddedType(loc.n)
      };
    });
}

// ── Drop-pin SVG generator ──────────────────────────────────────────────────
// Produces a classic Google-Maps-style teardrop pin as an inline SVG data URL.
// If imgDataUrl is provided, the image is clipped into the pin head circle.
// size = overall pin height in px; the head is ~60% of height.
// Results are cached — identical color+size combinations are never regenerated.
var _pinIconCache = {};
function makePinIcon(color, size, imgDataUrl) {
  // Cache key — skip cache when using custom image (data URL too large to key on)
  if (!imgDataUrl) {
    var cacheKey = color + '_' + size;
    if (_pinIconCache[cacheKey]) return _pinIconCache[cacheKey];
  }
  size = size || 32;
  var w   = Math.round(size * 0.72);   // pin width
  var h   = size;
  var r   = Math.round(w / 2);         // head radius
  var cx  = r;                         // center x
  var cy  = r;                         // center y (top of bounding box)
  var stroke = '#fff';
  var sw     = Math.max(1, Math.round(size / 18));

  // Clip path id — unique per call to avoid SVG id collisions
  var uid = 'pc' + Math.random().toString(36).slice(2,7);

  var imgTag = '';
  if (imgDataUrl) {
    imgTag =
      '<defs>' +
        '<clipPath id="' + uid + '">' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (r - sw - 1) + '"/>' +
        '</clipPath>' +
      '</defs>' +
      '<image href="' + imgDataUrl + '" ' +
        'x="' + (cx - r + sw + 1) + '" y="' + (cy - r + sw + 1) + '" ' +
        'width="' + ((r - sw - 1) * 2) + '" height="' + ((r - sw - 1) * 2) + '" ' +
        'clip-path="url(#' + uid + ')" preserveAspectRatio="xMidYMid slice"/>';
  }

  // Teardrop path: circle head + pointed tail
  var tailX = cx;
  var tailY = h - 1;
  // Control points for smooth tail
  var cp1x = cx - r * 0.45, cp1y = cy + r * 0.85;
  var cp2x = cx + r * 0.45, cp2y = cy + r * 0.85;

  var path =
    'M ' + cx + ' ' + tailY + ' ' +
    'C ' + cp1x + ' ' + cp1y + ' ' + (cx - r) + ' ' + (cy + r * 0.4) + ' ' + (cx - r) + ' ' + cy + ' ' +
    'A ' + r + ' ' + r + ' 0 1 1 ' + (cx + r) + ' ' + cy + ' ' +
    'C ' + (cx + r) + ' ' + (cy + r * 0.4) + ' ' + cp2x + ' ' + cp2y + ' ' + cx + ' ' + tailY + ' Z';

  var svg =
    '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" ' +
    'width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
    // Drop shadow
    '<filter id="sh' + uid + '" x="-30%" y="-10%" width="160%" height="160%">' +
      '<feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.35)"/>' +
    '</filter>' +
    '<g filter="url(#sh' + uid + ')">' +
      '<path d="' + path + '" fill="' + color + '" stroke="' + stroke + '" stroke-width="' + sw + '"/>' +
    '</g>' +
    imgTag +
    // If no image, show a small white dot in the centre of the head
    (!imgDataUrl ? '<circle cx="' + cx + '" cy="' + cy + '" r="' + Math.max(2, Math.round(r*0.28)) + '" fill="rgba(255,255,255,0.85)"/>' : '') +
    '</svg>';

  var dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  var icon = L.icon({
    iconUrl:     dataUrl,
    iconSize:    [w, h],
    iconAnchor:  [w/2, h],
    popupAnchor: [0, -h]
  });
  if (!imgDataUrl) _pinIconCache[color + '_' + size] = icon;
  return icon;
}

// Kept for backward compat with custom image uploads (wraps image in a pin)
function makeLeafletIcon(dataUrl, size) {
  // When a user uploads a custom image we still render it inside a pin shape
  return makePinIcon('#555555', size || 32, dataUrl);

// ── Geocoding ────────────────────────────────────────────
async function getCoords(zip) {
  const url = '/api/router?action=geocode-proxy&postalcode=' + encodeURIComponent(zip) + '&country=USA&limit=1';
  const res = await fetch(url, { headers: {'Accept-Language':'en'} });
  if (!res.ok) throw new Error('Geocoding HTTP ' + res.status);
  const data = await res.json();
  return data[0] ? { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) } : null;
}

// ── Overpass (OSM) ───────────────────────────────────────
const OVERPASS_URL = 'https://overpass-api.de/api/interpreter';

async function queryOverpass(q) {
  const body = 'data=' + encodeURIComponent(q);
  const hdrs = {'Content-Type':'application/x-www-form-urlencoded'};
  for (var attempt = 1; attempt <= 2; attempt++) {
    const ctrl = new AbortController();
    const timer = setTimeout(function(){ ctrl.abort(); }, 45000);
    try {
      setLoaderMsg(attempt === 1 ? 'Querying OSM/Overpass…' : 'Retrying Overpass…');
      const res = await fetch(OVERPASS_URL, {method:'POST', headers:hdrs, body, signal:ctrl.signal});
      clearTimeout(timer);
      if (res.status === 429 || res.status === 504) {
        await new Promise(function(r){ setTimeout(r, 3000); });
        continue;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (!json.elements) throw new Error('Unexpected Overpass response');
      return json.elements;
    } catch(e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') {
        if (attempt === 2) throw new Error('Overpass timed out. Try a smaller radius.');
      } else { throw e; }
    }
  }
  throw new Error('Overpass unavailable.');
}

// Convert radius in meters to a reasonable state+zip search strategy
// NPI API doesn't support radius search — we search by state derived from ZIP geocode
// and filter results by distance ourselves
async function getStateFromCoords(lat, lon) {
  try {
    const url = '/api/router?action=geocode-proxy&lat=' + lat + '&lon=' + lon + '&zoom=5';
    const res = await fetch(url, { headers: {'Accept-Language':'en'} });
    if (!res.ok) return null;
    const data = await res.json();
    return data.address && data.address['ISO3166-2-lvl4']
      ? data.address['ISO3166-2-lvl4'].replace('US-','')
      : (data.address && data.address.state_code ? data.address.state_code : null);
  } catch(e) { return null; }
}

// Haversine distance in meters
function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2)
    + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
    * Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Query NPI API — supports both NPI-1 (individuals) and NPI-2 (organizations)
async function queryNPI(taxonomyCode, state, enumerationType, limit) {
  enumerationType = enumerationType || 'NPI-2';
  limit = limit || 200;
  var url = '/api/router?action=npi-proxy&version=2.1'
    + '&taxonomy_description=' + encodeURIComponent(taxonomyCode)
    + '&state=' + encodeURIComponent(state)
    + '&limit=' + limit
    + '&enumeration_type=' + enumerationType;
  try {
    var res = await fetch(url);
    if (!res.ok) return [];
    var data = await res.json();
    return data.results || [];
  } catch(e) { return []; }
}

// Build a display name for NPI-1 (individual) results
// Uses practice name if available, otherwise "Dr. Last, First — Specialty"
function npi1DisplayName(basic, taxonomy) {
  // Many NPI-1 records have an organization/practice name in authorized_official fields
  // or in the basic.organization_name (group practice billing under individual NPI)
  if (basic.organization_name) return basic.organization_name;
  var last  = basic.last_name  || '';
  var first = basic.first_name || '';
  var mid   = basic.middle_name ? ' ' + basic.middle_name : '';
  var cred  = basic.credential ? ', ' + basic.credential : '';
  var spec  = taxonomy && taxonomy.desc ? ' — ' + taxonomy.desc : '';
  return (last ? last + ', ' + first + mid + cred : 'Unknown Provider') + spec;
}

// Convert an NPI result (NPI-1 or NPI-2) to the same shape as an OSM element
function npiToFacility(npi, lat, lon, enumerationType) {
  var basic    = npi.basic || {};
  var addr     = (npi.addresses || []).find(function(a){ return a.address_purpose === 'LOCATION'; })
              || (npi.addresses || [])[0] || {};
  var taxonomy = (npi.taxonomies || []).find(function(t){ return t.primary; })
              || (npi.taxonomies || [])[0] || {};
  var isIndividual = enumerationType === 'NPI-1';

  // For NPI-1: use practice/group name if available, else formatted provider name
  var displayName = isIndividual
    ? npi1DisplayName(basic, taxonomy)
    : (basic.organization_name || basic.name || 'Unknown');

  // For groupBySystem: prefer organization name for affiliation detection
  var orgName = basic.organization_name || '';

  return {
    id:   'npi_' + npi.number,
    type: 'npi',
    npiType: enumerationType || 'NPI-2',
    lat:  lat,
    lon:  lon,
    tags: {
      name:              displayName,
      operator:          orgName,
      healthcare:        'npi',
      npi_number:        npi.number,
      npi_type:          enumerationType || 'NPI-2',
      npi_taxonomy_code: taxonomy.code || '',
      npi_taxonomy_desc: taxonomy.desc || '',
      npi_org:           orgName,
      address:           addr.address_1 || '',
      city:              addr.city || '',
      state:             addr.state || '',
      postcode:          addr.postal_code || ''
    }
  };
}

// Geocode an NPI address to lat/lon using Nominatim
// Batched with a small delay to respect rate limits
async function geocodeAddress(addr, city, state, zip) {
  var q = [addr, city, state, zip].filter(Boolean).join(', ') + ', USA';
  try {
    var url = '/api/router?action=geocode-proxy&q=' + encodeURIComponent(q) + '&limit=1&countrycodes=us';
    var res = await fetch(url, { headers: {'Accept-Language':'en'} });
    if (!res.ok) return null;
    var data = await res.json();
    return data[0] ? { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) } : null;
  } catch(e) { return null; }
}

// Main NPI fetch: get facilities for selected types within radius of lat/lon
async function fetchNPIFacilities(lat, lon, radiusMeters, types) {
  // NPI now routed through Azure Function proxy — works in all hosted environments
  setLoaderMsg('Querying NPI Registry…');

  // Get state abbreviation for NPI query
  var state = await getStateFromCoords(lat, lon);
  if (!state) {
    console.warn('Could not determine state for NPI query — skipping NPI');
    return [];
  }

  // Collect unique taxonomy codes for selected types
  var ALL_TYPES = ['hospital','clinic','ed','outpatient','rehab','urgent_care','specialist'];
  var selectedTypes = (types && types.length && types.length < ALL_TYPES.length) ? types : ALL_TYPES;
  var taxCodes = new Set();
  selectedTypes.forEach(function(t) {
    (NPI_TAXONOMY[t] || []).forEach(function(code){ taxCodes.add(code); });
  });

  var codeArr = [...taxCodes];

  // ── NPI-2: Organizations (hospitals, clinics, group practices) ────────────
  setLoaderMsg('NPI-2 (organizations)…');
  var npi2Raw = [];
  for (var i = 0; i < codeArr.length; i += 5) {
    var batch2 = codeArr.slice(i, i + 5);
    setLoaderMsg('NPI-2: ' + Math.min(i+5, codeArr.length) + '/' + codeArr.length + '…');
    var b2Results = await Promise.all(
      batch2.map(function(code){ return queryNPI(code, state, 'NPI-2', 200); })
    );
    b2Results.forEach(function(r){ npi2Raw = npi2Raw.concat(r); });
    if (i + 5 < codeArr.length) await new Promise(function(r){ setTimeout(r, 200); });
  }

  // ── NPI-1: Individual practitioners (solo/small specialist offices) ────────
  // Only query taxonomy codes relevant to specialists and primary care —
  // not hospitals/facilities since individuals don't run those
  var npi1Types = ['specialist','clinic','outpatient'];
  var npi1Codes = new Set();
  selectedTypes.filter(function(t){ return npi1Types.indexOf(t) >= 0; })
    .forEach(function(t){ (NPI_TAXONOMY[t] || []).forEach(function(c){ npi1Codes.add(c); }); });
  var npi1Arr = [...npi1Codes];

  setLoaderMsg('NPI-1 (individual providers)…');
  var npi1Raw = [];
  for (var k = 0; k < npi1Arr.length; k += 5) {
    var batch1 = npi1Arr.slice(k, k + 5);
    setLoaderMsg('NPI-1: ' + Math.min(k+5, npi1Arr.length) + '/' + npi1Arr.length + '…');
    var b1Results = await Promise.all(
      batch1.map(function(code){ return queryNPI(code, state, 'NPI-1', 200); })
    );
    b1Results.forEach(function(r){ npi1Raw = npi1Raw.concat(r); });
    if (k + 5 < npi1Arr.length) await new Promise(function(r){ setTimeout(r, 200); });
  }

  // ── Deduplicate across both sets by NPI number ────────────────────────────
  var seen = new Set();
  // Tag each result with its enumeration type before deduplication
  var allRaw = npi2Raw.map(function(r){ r._enumType = 'NPI-2'; return r; })
    .concat(npi1Raw.map(function(r){ r._enumType = 'NPI-1'; return r; }));

  var unique = allRaw.filter(function(r) {
    if (seen.has(r.number)) return false;
    seen.add(r.number);
    return true;
  });

  console.log('NPI raw: ' + npi2Raw.length + ' orgs (NPI-2) + ' + npi1Raw.length + ' individuals (NPI-1) = ' + unique.length + ' unique');

  // ── Geocode and filter by radius ──────────────────────────────────────────
  setLoaderMsg('Geocoding NPI results…');
  var facilities = [];
  // Prioritise: NPI-2 orgs first (more reliable names), then NPI-1 individuals
  // Cap at 400 total to keep geocoding time reasonable
  var npi2Unique = unique.filter(function(r){ return r._enumType === 'NPI-2'; }).slice(0, 250);
  var npi1Unique = unique.filter(function(r){ return r._enumType === 'NPI-1'; }).slice(0, 150);
  var toGeocode  = npi2Unique.concat(npi1Unique);

  for (var j = 0; j < toGeocode.length; j += 10) {
    var gBatch = toGeocode.slice(j, j + 10);
    setLoaderMsg('Geocoding ' + Math.min(j+10, toGeocode.length) + '/' + toGeocode.length + '…');
    var gResults = await Promise.all(gBatch.map(function(npi) {
      var addr = (npi.addresses || []).find(function(a){ return a.address_purpose === 'LOCATION'; })
              || (npi.addresses || [])[0] || {};
      return geocodeAddress(addr.address_1, addr.city, addr.state, addr.postal_code)
        .then(function(coords) {
          if (!coords) return null;
          if (haversineMeters(lat, lon, coords.lat, coords.lon) > radiusMeters) return null;
          return npiToFacility(npi, coords.lat, coords.lon, npi._enumType);
        });
    }));
    gResults.forEach(function(f){ if (f) facilities.push(f); });
    if (j + 10 < toGeocode.length) await new Promise(function(r){ setTimeout(r, 100); });
  }

  console.log('NPI: ' + facilities.length + ' geocoded within radius (' +
    facilities.filter(function(f){ return f.npiType==='NPI-1'; }).length + ' individuals, ' +
    facilities.filter(function(f){ return f.npiType==='NPI-2'; }).length + ' orgs)');
  return facilities;
}

// OSM tag pairs to query per facility type.
// Tightly scoped — only tags that reliably indicate care-coordination-relevant facilities.
const FTYPE_TAGS = {
  hospital:    [ ['amenity','hospital'],
                 ['healthcare','hospital'] ],
  clinic:      [ ['amenity','clinic'],
                 ['amenity','doctors'],
                 ['healthcare','clinic'],
                 ['healthcare','doctor'],
                 ['healthcare','centre'],        // community health centers
                 ['healthcare','health_centre'] ],  // health centres
  ed:          [ ['amenity','hospital'],
                 ['healthcare','emergency'] ],
  outpatient:  [ ['healthcare','centre'],
                 ['healthcare','health_centre'],
                 ['healthcare','outpatient'],
                 ['amenity','clinic'],
                 ['amenity','doctors'] ],
  rehab:       [ ['healthcare','rehabilitation'],
                 ['amenity','nursing_home'],
                 ['healthcare','nursing_home'],  // SNFs tagged under healthcare
                 ['healthcare','hospice'],
                 ['amenity','clinic'],
                 ['healthcare','physiotherapist'] ],
  urgent_care: [ ['amenity','urgent_care'],
                 ['healthcare','urgent_care'] ],
  // Specialist offices: OSM tags healthcare=doctor or amenity=doctors
  // with speciality=* subtag (cardiology, oncology, neurology, etc.)
  // We query the parent tags and filter by speciality in post-processing
  specialist:  [ ['healthcare','doctor'],
                 ['amenity','doctors'],
                 ['healthcare','centre'],
                 ['healthcare','health_centre'] ]
};

// Specialist name/tag patterns — used to identify specialist offices
// from the broader doctor/clinic results
const SPECIALIST_TAGS = new Set([
  'cardiology','oncology','neurology','orthopedics','orthopaedics',
  'gastroenterology','pulmonology','rheumatology','nephrology','urology',
  'endocrinology','dermatology','hematology','infectious_disease',

  'pediatrics','geriatrics','sports_medicine','radiology',
  'pathology','anesthesiology','physical_medicine','physiatry'
]);

const SPECIALIST_NAME_RX = /\b(cardiol|oncol|neurolog|orthoped|orthopaed|gastro|pulmonol|rheumatol|nephrolog|urolog|endocrinol|hematol|infectious disease|immunol|allerg|vascular|thoracic|plastic surg|otolaryng|pain management|obstetric|gynecol|ob.?gyn|maternal|neonatol|pediatric|geriatric|sports medicine|radiolog|patholog|anesthesiol|physiatry|physiatrist|rehabilitation medicine|spine center|spine clinic|cancer center|cancer clinic|heart center|heart clinic|women.?s health|men.?s health|neurosurg|oral surg|hand surg|shoulder|knee clinic|joint replacement|bariatric|fertility|infertility|ivf clinic)\b/i;

// Hard allowlist — ONLY these amenity/healthcare values are ever kept.
// Anything without one of these is dropped (blocks building=*, leisure=*, golf=*, etc.)
const ALLOWED_AMENITY = new Set([
  'hospital','clinic','doctors','urgent_care','nursing_home'
]);
const ALLOWED_HEALTHCARE = new Set([
  'hospital','clinic','doctor','centre','health_centre','outpatient',
  'emergency','urgent_care','rehabilitation','hospice','physiotherapist',
  'specialist'

// Name patterns that always exclude even if tags look valid
const REHAB_ALLOW_RX = /\b(rehab(ilitation)?|physical therapy|pt center|sports medicine|orthopaedic|orthopedic|spine center|pain management)\b/i;

const EXCLUDE_NAME_RX = [
  // Dental
  /\bdent(al|ist|istry)\b/i, /\orthodont/i, /\bendodont/i,

// Specialist detection — kept even if other exclude rules would match
function isSpecialistFacility(facility) {
  var tags = facility.tags || {};
  if (tags.speciality && SPECIALIST_TAGS.has(tags.speciality.toLowerCase())) return true;
  if (tags.specialty  && SPECIALIST_TAGS.has(tags.specialty.toLowerCase()))  return true;
  if (SPECIALIST_NAME_RX.test(tags.name || '')) return true;
  return false;
}

function shouldExclude(facility) {
  var tags       = facility.tags || {};
  var amenity    = tags.amenity    || '';
  var healthcare = tags.healthcare || '';
  var name       = tags.name       || '';

  // NPI, CMS, Excel, and manually added facilities are pre-vetted — never exclude
  if (facility.type === 'npi' || facility.type === 'cms' ||
      facility.type === 'excel' || facility.type === 'manual' ||
      (facility.id && String(facility.id).startsWith('manual_'))) return false;

  // Specialist offices are always kept regardless of other filters
  if (isSpecialistFacility(facility)) return false;

  // Must have at least one recognised tag — blocks bare building/leisure/golf nodes
  if (!ALLOWED_AMENITY.has(amenity) && !ALLOWED_HEALTHCARE.has(healthcare)) return true;

  // Block explicitly bad tag values
  var badAmenity = ['dentist','pharmacy','optometrist','chiropractor','podiatrist',
                    'audiologist','beauty','hairdresser','massage','veterinary'];
  if (badAmenity.indexOf(amenity) >= 0) return true;

  var badHealthcare = ['dentist','dental','pharmacy','optometrist','chiropractor',
                       'podiatrist','audiologist','psychotherapist',
                       'psychologist','speech_therapist','acupuncturist','nurse',
                       'midwife','blood_bank','blood_donation'];
  // Note: physiotherapist is kept when part of a rehab center context
  if (badHealthcare.indexOf(healthcare) >= 0) {
    // Allow physiotherapist if name suggests a rehab/PT center
    if (healthcare === 'physiotherapist' && REHAB_ALLOW_RX.test(name)) return false;
    return true;
  }

  // Block by name keywords
  for (var i = 0; i < EXCLUDE_NAME_RX.length; i++) {
    if (EXCLUDE_NAME_RX[i].test(name)) return true;
  }
  return false;
}

// ── CMS Provider of Services ─────────────────────────────
// Queries the locally-loaded cms_providers.json file
// No API calls, no rate limits, no CORS issues — pure local lookup
async function fetchCMSFacilities(lat, lon, radiusMeters, types) {
  var data = await loadCMSData();
  if (!data || !data.by_state) return [];

  // Get state(s) to search — include neighboring states for border areas
  var primaryState = await getStateFromCoords(lat, lon);
  if (!primaryState) return [];

  // Collect facilities from this state
  var candidates = data.by_state[primaryState] || [];

  // Also check adjacent states (rough — include all states within ~50 miles)
  // Simple approach: check all states and filter by distance
  Object.entries(data.by_state).forEach(function(entry) {
    if (entry[0] !== primaryState && entry[0] !== 'XX') {
      // Only scan other states if they have a facility within a reasonable bounding box
      var sample = entry[1][0];
      if (sample && haversineMeters(lat, lon, sample.lat, sample.lon) < radiusMeters + 100000) {
        candidates = candidates.concat(entry[1]);
      }
    }
  });

  // Map our type selections to CMS facility type strings
  var ALL_TYPES = ['hospital','clinic','ed','outpatient','rehab','urgent_care','specialist'];
  var selectedTypes = (!types || !types.length || types.length === ALL_TYPES.length) ? ALL_TYPES : types;
  var typeSet = new Set(selectedTypes);

  // Filter by radius and type
  var results = [];
  candidates.forEach(function(f) {
    if (!f.lat || !f.lon) return;
    if (haversineMeters(lat, lon, f.lat, f.lon) > radiusMeters) return;

    // Map CMS facility type to our type categories
    var facType = f.fac_type || 'clinic';
    // ED is a subset of hospital in CMS
    if (facType === 'hospital' && typeSet.has('hospital')) {
      // include
    } else if (facType === 'hospital' && typeSet.has('ed')) {
      // include hospitals when ED is selected
    } else if (!typeSet.has(facType)) {
      return; // skip types not selected
    }

    // Convert to our standard facility shape
    results.push({
      id:   f.id,
      type: 'cms',
      lat:  f.lat,
      lon:  f.lon,
      tags: {
        name:       f.name || 'Unknown',
        healthcare: 'cms',
        cms_type:   f.cms_type || '',
        fac_type:   f.fac_type || '',
        npi:        f.npi || '',
        address:    f.addr || '',
        city:       f.city || '',
        state:      f.state || '',
        postcode:   f.zip || ''
      }
    });
  });

  console.log('CMS: ' + results.length + ' facilities within radius from ' + candidates.length + ' state candidates');
  return results;
}

// Simple in-memory cache — avoids re-querying on target/display changes
const facilityCache = {};

function buildOverpassQuery(lat, lon, radius, types) {
  var ALL_TYPES = ['hospital','clinic','ed','outpatient','rehab','urgent_care','specialist'];
  var seen = new Set();
  var clauses = [];
  var selectedTypes = (!types.length || types.length === ALL_TYPES.length) ? ALL_TYPES : types;
  selectedTypes.forEach(function(t) {
    (FTYPE_TAGS[t] || []).forEach(function(pair) {
      var key = pair[0] + '=' + pair[1];
      if (!seen.has(key)) {
        seen.add(key);
        clauses.push('node["'+pair[0]+'"="'+pair[1]+'"](around:'+radius+','+lat+','+lon+');');
        clauses.push('way["'+pair[0]+'"="'+pair[1]+'"](around:'+radius+','+lat+','+lon+');');
      }
    });
  });
  return '[out:json][timeout:30];('+clauses.join('')+');out center tags;';
}

// Merge two facility arrays, deduplicating by name+proximity.
// baseFacs is the authoritative set; newFacs are added only if not already present.
function mergeFacilities(baseFacs, newFacs) {
  var merged = baseFacs.slice();

  newFacs.forEach(function(nf) {
    var nfName = (nf.tags && nf.tags.name || '').toLowerCase().trim();
    // Unnamed facilities are always added — no name to match on
    if (!nfName) { merged.push(nf); return; }

    var isDupe = baseFacs.some(function(of) {
      var ofName = (of.tags && of.tags.name || '').toLowerCase().trim();
      if (!ofName) return false;

      // Use the shorter name's full length as the comparison slice, minimum 6 chars
      var minLen = Math.min(ofName.length, nfName.length);
      if (minLen < 6) return false;

      var nameMatch = ofName.includes(nfName.slice(0, minLen)) ||
                      nfName.includes(ofName.slice(0, minLen));
      if (!nameMatch) return false;

      var ofLat = of.lat || (of.center && of.center.lat);
      var ofLon = of.lon || (of.center && of.center.lon);
      if (!ofLat) return false;
      return haversineMeters(nf.lat, nf.lon, ofLat, ofLon) < 200;
    });

    if (!isDupe) merged.push(nf);
  });

  console.log('mergeFacilities: ' + baseFacs.length + ' base + ' + newFacs.length + ' new = ' + merged.length + ' total (' + (merged.length - baseFacs.length) + ' additions)');
  return merged;
}

async function getFacilities(lat, lon, radius, types) {
  var cacheKey = lat.toFixed(3)+','+lon.toFixed(3)+','+radius+','+[...types].sort().join(',');
  if (facilityCache[cacheKey]) {
    setLoaderMsg('Using cached results…');
    return facilityCache[cacheKey];
  }

  setLoaderMsg('Fetching market data…');

  var osmPromise = queryOverpass(buildOverpassQuery(lat, lon, radius, types))
    .then(function(raw) { return raw.filter(function(f){ return !shouldExclude(f); }); })
    .catch(function(e) { console.warn('OSM failed:', e.message); return []; });

  var cmsPromise = fetchCMSFacilities(lat, lon, radius, types)
    .catch(function(e){ console.warn('CMS failed:', e.message); return []; });

  var results_arr = await Promise.all([osmPromise, cmsPromise]);
  var osmFacs = results_arr[0];
  var cmsFacs = results_arr[1];

  var merged = mergeFacilities(osmFacs, cmsFacs);

  console.log('OSM: '+osmFacs.length+' | CMS: '+cmsFacs.length+' | Merged: '+merged.length);

  facilityCache[cacheKey] = merged;
  return merged;
}

// Build search tokens from a typed name — splits on spaces, dashes, common words
function tokenize(str) {
  // Only strip pure connector words — keep substantive words like 'health',
  // 'methodist', 'memorial' etc. that distinguish one system from another.
  var stopwords = new Set(['the','and','for','of','at','in','by','to','a','an']);
  return str.toLowerCase()
    .replace(/[^a-z0-9 ]/g, ' ')
    .split(/\s+/)
    .filter(function(w){ return w.length > 1 && !stopwords.has(w); });
}

// Score how well a facility name matches the typed target (0 = no match)
function matchScore(facilityName, targetTokens) {
  if (!facilityName) return 0;
  const fn = facilityName.toLowerCase();
  let score = 0;
  targetTokens.forEach(function(tok) {
    if (fn.includes(tok)) score++;
  });
  return score;
}

function groupBySystem(facilities, targetInput) {
  const systems = {};
  const targetTokens = tokenize(targetInput);
  const targetLower  = targetInput.toLowerCase();
  // Pre-compute target domain if user typed a known system name
  var targetDomain = null;
  if (typeof DOMAIN_SYSTEM_MAP !== 'undefined') {
    Object.entries(DOMAIN_SYSTEM_MAP).forEach(function(entry) {
      if (entry[1].toLowerCase() === targetLower ||
          entry[1].toLowerCase().includes(targetLower) ||
          targetLower.includes(entry[1].toLowerCase().split(' ')[0])) {
        targetDomain = entry[0];
      }
    });
  }

  facilities.forEach(function(h) {
    var rawName = h.tags && h.tags.name ? h.tags.name : 'Unknown';
    var npiOrg  = h.tags && h.tags.npi_org ? h.tags.npi_org : '';
    const name    = (npiOrg.length > rawName.length) ? npiOrg : rawName;
    const nameLow = name.toLowerCase();
    let bucket    = null;

    // ── Step 0: Use authoritative domain attribution from embedded data ──────
    // This is the most reliable signal — the endpoint domain identifies
    // exactly which EHR instance (= health system) the facility belongs to.
    var facDomain = h.dom || (h.tags && h.tags.dom) || '';
    var facSys    = h._embeddedSystem || (h.tags && h.tags._embeddedSystem) || '';

    if (!bucket && facDomain && typeof DOMAIN_SYSTEM_MAP !== 'undefined') {
      var mappedSys = DOMAIN_SYSTEM_MAP[facDomain];
      if (mappedSys) {
        // Check if this domain matches the target
        if (facDomain === targetDomain ||
            (targetTokens.length > 0 && matchScore(mappedSys, targetTokens) === targetTokens.length)) {
          bucket = targetInput;
        } else {
          bucket = mappedSys;
        }
      }
    }

    // Use pre-assigned system from embedded data if available
    if (!bucket && facSys) {
      if (targetTokens.length > 0 && matchScore(facSys, targetTokens) === targetTokens.length) {
        bucket = targetInput;
      } else {
        bucket = facSys;
      }
    }

    // ── Step 1: Match against the typed target by name (fallback for OSM/NPI)
    if (!bucket && targetTokens.length > 0 &&
        matchScore(name, targetTokens) === targetTokens.length) {
      bucket = targetInput;
    }

    // ── Step 2: Match against known parent health system names
    if (!bucket) {
      for (var i = 0; i < KNOWN_SYSTEMS.length; i++) {
        var sys = KNOWN_SYSTEMS[i];
        // Skip if this system matches the typed target (avoid double-claiming)
        if (sys.name.toLowerCase() === targetLower ||
            targetTokens.some(function(t){ return sys.name.toLowerCase().includes(t); })) continue;
        for (var j = 0; j < sys.patterns.length; j++) {
          var pat = sys.patterns[j];
          // Use word-boundary check: pattern must appear as a whole phrase,
          // not as a fragment inside another word
          var patRx = new RegExp('(?:^|[\\s\\-,\\/])' + pat.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(?:[\\s\\-,\\/]|$)');
          if (patRx.test(nameLow)) {
            bucket = sys.name;
            break;
          }
        }
        if (bucket) break;
      }
    }

    // ── Step 3: Anything unrecognized → "Independent / Community"
    // No keyword-fragment bucketing — keeps the legend and insights clean.
    if (!bucket) {
      bucket = 'Independent / Community';
    }

    if (!systems[bucket]) systems[bucket] = [];
    systems[bucket].push(h);
  });

  return systems;
}

function resetColors() {
  Object.keys(colorMap).forEach(k => delete colorMap[k]);
  colorIdx = 0;
}

function getColor(sys, targetKey) {
  if (sys === targetKey) return document.getElementById('targetColor').value;
  if (sys === 'Independent / Community') return document.getElementById('independentColor').value;
  // Each named competitor system gets its own unique color from the palette
  if (!colorMap[sys]) {
    while (SYSTEM_COLORS[colorIdx % SYSTEM_COLORS.length] ===
           document.getElementById('targetColor').value) { colorIdx++; }
    colorMap[sys] = SYSTEM_COLORS[colorIdx % SYSTEM_COLORS.length];
    colorIdx++;
  }
  return colorMap[sys];
}

function buildLegend(systems, targetKey) {
  const el = document.getElementById('legItems');
  // Always show target first, then top 4 competitors by count
  const sorted = Object.entries(systems).sort((a,b) => b[1].length - a[1].length);
  const target  = sorted.filter(([s]) => s === targetKey);
  const others  = sorted.filter(([s]) => s !== targetKey).slice(0, 4);
  const display = [...target, ...others];
  const total   = Object.keys(systems).length;

  el.innerHTML = display.map(([sys]) => {
    const c = getColor(sys, targetKey);
    const isT = sys === targetKey;
    const label = isT ? '<strong>' + sys + '</strong>' : sys;
    // Mini teardrop SVG for legend
    const ps = isT ? 18 : 14;
    const pw = Math.round(ps * 0.72);
    const pr = Math.round(pw / 2);
    const tailY = ps - 1;
    const cp1x = pr - pr*0.45, cp1y = pr + pr*0.85;
    const cp2x = pr + pr*0.45, cp2y = pr + pr*0.85;
    const path = 'M '+pr+' '+tailY+' C '+cp1x+' '+cp1y+' 0 '+(pr+pr*0.4)+' 0 '+pr+' A '+pr+' '+pr+' 0 1 1 '+pw+' '+pr+' C '+pw+' '+(pr+pr*0.4)+' '+cp2x+' '+cp2y+' '+pr+' '+tailY+' Z';
    const dot = '<svg width="'+pw+'" height="'+ps+'" viewBox="0 0 '+pw+' '+ps+'" style="flex-shrink:0;margin-right:2px"><path d="'+path+'" fill="'+c+'" stroke="white" stroke-width="1"/></svg>';
    return '<div class="leg-row">' + dot + '<span style="font-size:11px">' + label + '</span></div>';
  }).join('') + (total > 5 ? '<div style="font-size:10px;color:var(--muted);margin-top:5px;padding-top:4px;border-top:1px solid var(--border)">+' + (total - 5) + ' more in Insights</div>' : '');
}

// ════════════════════════════════════════════════════════
//  MARKER DRAWING  (rollup vs individual)
// ════════════════════════════════════════════════════════
function drawMarkers(systems, targetKey) {
  clearMarkers();
  const mode = document.getElementById('displayMode').value;

  if (mode === 'rollup') {
    // One marker per SYSTEM at centroid
    Object.entries(systems).forEach(([sys, facs]) => {
      const lats = facs.map(f => f.lat ?? f.center?.lat).filter(v => v != null);
      const lons = facs.map(f => f.lon ?? f.center?.lon).filter(v => v != null);
      if (!lats.length) return;
      const lat = lats.reduce((a,b)=>a+b,0)/lats.length;
      const lon = lons.reduce((a,b)=>a+b,0)/lons.length;
      const isTarget = sys === targetKey;
      const color = getColor(sys, targetKey);
      const iconUrl = isTarget ? customIcons.target : customIcons.competitor;
      const pinSize = isTarget ? parseInt(document.getElementById('targetPinSize').value) : 30;
      const pinIcon = makePinIcon(color, pinSize, iconUrl || null);
      const marker = L.marker([lat, lon], { icon: pinIcon, pane: isTarget?'targetPane':'defaultPane' });
      marker.bindPopup(`<strong>${sys}</strong><br/><em style="color:#6b7280">${facs.length} facilit${facs.length===1?'y':'ies'} in area</em>`);
      marker._cpiqSys = sys;
      marker.addTo(mapInstance);
      markers.push(marker);
    });
  } else {
    // One marker per LOCATION
    Object.entries(systems).forEach(([sys, facs]) => {
      const isTarget = sys === targetKey;
      const color = getColor(sys, targetKey);
      facs.forEach(f => {
        const lat = f.lat ?? f.center?.lat;
        const lon = f.lon ?? f.center?.lon;
        if (lat == null || lon == null) return;
        const iconUrl = isTarget ? customIcons.target : customIcons.competitor;
        const pinSize = isTarget ? parseInt(document.getElementById('targetPinSize').value) : 28;
        const pinIcon = makePinIcon(color, pinSize, iconUrl || null);
        const marker = L.marker([lat, lon], { icon: pinIcon, pane: isTarget?'targetPane':'defaultPane' });
        var _popName = f.tags&&f.tags.name ? f.tags.name : 'Unknown';
        var _popSrc = f.type==='npi'
          ? '<br/><span style="font-size:10px;color:#94a3b8">NPI'+(f.npiType==='NPI-1'?' (Individual)':' (Org)')+(f.tags.npi_taxonomy_desc?' · '+f.tags.npi_taxonomy_desc:'')+'</span>'
          : f.type==='cms'
          ? '<br/><span style="font-size:10px;color:#94a3b8">CMS'+(f.tags.city?' · '+f.tags.city:'')+'</span>'
          : '';
        marker.bindPopup('<strong>'+_popName+'</strong><br/><em style="color:#6b7280">'+sys+'</em>'+_popSrc);
        marker._cpiqSys = sys;
        marker.addTo(mapInstance);
        markers.push(marker);
      });
    });
  }
}

//  ANALYTICS HELPERS
// ════════════════════════════════════════════════════════
function findTargetKey(systems, target) {
  return Object.keys(systems).find(s => s.toLowerCase().includes(target.toLowerCase())) || null;
}

// Pressure ratio: competitor volume / target volume (higher = more pressure)
function pressureRatio(targetCount, totalCompetitorCount) {
  if (targetCount === 0) return totalCompetitorCount > 0 ? 99 : 0;
  return (totalCompetitorCount / targetCount).toFixed(2);
}

// ED follow-up exposure: proxy = fraction of competitor facilities that are hospitals
// (hospitals have EDs → discharged patients can easily follow up at competitor)
function edExposure(competitorFacs, allFacs) {
  // Score 0-100: ratio of competitor hospitals vs total hospitals
  const total = allFacs.length;
  if (total === 0) return 0;
  return Math.round((competitorFacs.length / total) * 100);
}

function ratingLabel(score) {
  if (score >= 75) return {label:'Critical', cls:'chip-red'};
  if (score >= 50) return {label:'High',     cls:'chip-red'};
  if (score >= 25) return {label:'Moderate', cls:'chip-yellow'};
  return               {label:'Low',      cls:'chip-green'};
}

function gaugeHtml(pct, color) {
  return `<div class="gauge-wrap"><div class="gauge-track"><div class="gauge-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div></div></div>`;
}

// Generate plain-English summary for export panel
function generateSummary(targetKey, targetCount, total, shareP, pr, edScore, competitors, leakage) {
  const top      = competitors[0];
  const second   = competitors[1];
  const prNum    = parseFloat(pr);
  const totalComp = total - targetCount;

  // Opening: frame the competitive reality concisely
  let txt = `${targetKey || 'Target'} holds <strong>${shareP}% market share</strong> with ${targetCount} location${targetCount===1?'':'s'} — facing ${totalComp} competitor sites across ${competitors.length} system${competitors.length===1?'':'s'} in this market. `;

  // Top threat with stakes
  if (top) {
    const topShare = total > 0 ? Math.round((top.count / total) * 100) : 0;
    txt += `<strong>${top.name}</strong> is the primary threat at ${top.count} sites (${topShare}% share)`;
    if (second) {
      const secShare = total > 0 ? Math.round((second.count / total) * 100) : 0;
      txt += `, followed by <strong>${second.name}</strong> at ${second.count} sites (${secShare}%)`;
    }
    txt += `. `;
  }

  // Leakage signal
  if (leakage.length > 0) {
    txt += `<strong>${leakage.length} competitor system${leakage.length>1?'s':''}</strong> match or exceed ${targetKey||'target'}'s footprint — a direct indicator of active patient leakage. `;
  }

  // Call to action
  if (prNum >= 2 || leakage.length > 0 || edScore >= 50) {
    txt += `This market represents a significant care continuity opportunity. <em>Let's connect to discuss a targeted retention strategy.</em>`;
  } else if (shareP >= 40) {
    txt += `Market position is strong — proactive care coordination can protect and extend this advantage. <em>Let's connect to discuss how.</em>`;
  } else {
    txt += `Structured care coordination could meaningfully improve retention in this market. <em>Let's connect to explore the opportunity.</em>`;
  }
  return txt;
}

// ════════════════════════════════════════════════════════
//  PANEL: INSIGHTS
// ════════════════════════════════════════════════════════
function buildInsights() {
  const { systems, target } = lastData;
  const el = document.getElementById('insights');
  const targetKey   = findTargetKey(systems, target);
  const targetFacs  = targetKey ? systems[targetKey] : [];
  const targetCount = targetFacs.length;
  const total       = Object.values(systems).reduce((a,v)=>a+v.length,0);
  const totalComp   = total - targetCount;
  const shareP      = total > 0 ? Math.round((targetCount/total)*100) : 0;
  const compShareP  = total > 0 ? Math.round((totalComp/total)*100) : 0;

  const competitors = Object.entries(systems)
    .filter(([s]) => s !== targetKey)
    .map(([name,arr]) => ({ name, count: arr.length, share: total>0?Math.round((arr.length/total)*100):0 }))
    .sort((a,b) => b.count - a.count);

  const totalCompCount = competitors.reduce((a,c)=>a+c.count,0);
  const top     = competitors[0];
  const leakage = competitors.filter(c => c.count >= targetCount);
  const pr      = pressureRatio(targetCount, totalCompCount);
  const prNum   = parseFloat(pr);
  const allCompFacs = Object.entries(systems).filter(([s])=>s!==targetKey).flatMap(([,v])=>v);
  const edScore     = edExposure(allCompFacs, Object.values(systems).flat());
  const edRating    = ratingLabel(edScore);
  const summary     = generateSummary(targetKey, targetCount, total, shareP, pr, edScore, competitors, leakage);

  // Color helpers
  const shareColor = shareP >= 40 ? '#16a34a' : shareP >= 20 ? '#2563eb' : '#e02424';
  const prColor    = prNum >= 4 ? '#e02424' : prNum >= 2 ? '#ea580c' : prNum >= 1 ? '#2563eb' : '#16a34a';
  const edColor    = edScore >= 50 ? '#e02424' : edScore >= 25 ? '#ea580c' : '#16a34a';
  const lkColor    = leakage.length > 0 ? '#e02424' : '#16a34a';

  // Insight card: metric + explanation
  function insightCard(metric, value, pct, color, explanation, gauge=true) {
    return `<div style="background:#fff;border:1px solid var(--border);border-left:3px solid ${color};

        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text)">${metric}</span>
        <span style="font-size:18px;font-weight:700;color:${color}">${value}</span>
      </div>
      ${gauge ? gaugeHtml(Math.min(typeof pct==='number'?pct:0, 100), color) : ''}
      <div style="font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5">${explanation}</div>
    </div>`;
  }

  // Leakage systems rows — capped at top 10
  const leakageTop10 = leakage.slice(0, 10);
  const leakageRows = leakageTop10.length
    ? leakageTop10.map((l, i) => {
        const lShare = total > 0 ? Math.round((l.count / total) * 100) : 0;
        const barW   = top && top.count > 0 ? Math.round((l.count / top.count) * 100) : 0;
        const rank   = i + 1;
        const isHighRisk = l.count >= targetCount;
        return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
            <span style="font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:6px">
              <span style="font-size:10px;color:var(--muted-2);font-weight:400;margin-right:4px">#${rank}</span>${l.name}
            </span>
            <span style="display:flex;gap:5px;align-items:center;flex-shrink:0">
              <span style="font-size:11px;color:var(--muted)">${lShare}%</span>
              <span class="chip ${isHighRisk ? 'chip-red' : 'chip-yellow'}">${l.count} sites</span>
            </span>
          </div>
          <div style="height:4px;background:#f1f3f7;border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${barW}%;background:${isHighRisk ? '#e02424' : '#d97706'};border-radius:99px;transition:width .4s"></div>
          </div>

      }).join('')
      + (leakage.length > 10 ? `<p style="font-size:10px;color:var(--muted);margin-top:6px;font-style:italic">+${leakage.length - 10} more systems not shown</p>` : '')
    : '<p class="empty">No systems match or exceed target footprint.</p>';

  // Competitor rows — top 10 by default, ranked
  const compRowsHtml = competitors.length
    ? competitors.slice(0, 10).map((c, i) => {
        const isTopThreat = i === 0;
        const isMaterial  = c.count >= targetCount;
        const barW = top && top.count > 0 ? Math.round((c.count / top.count) * 100) : 0;
        return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
            <span style="font-size:12px;font-weight:${isTopThreat?'700':'500'};color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:6px">
              <span style="font-size:10px;color:var(--muted-2);font-weight:400;margin-right:4px">#${i+1}</span>${c.name}
              ${isTopThreat ? '<span style="font-size:9px;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:3px;padding:1px 5px;margin-left:4px;vertical-align:middle">Top Threat</span>' : ''}

          </div>
          <div style="height:4px;background:#f1f3f7;border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${barW}%;background:${isTopThreat?'#e02424':'#94a3b8'};border-radius:99px;transition:width .4s"></div>
          </div>
        </div>`;
      }).join('')
      + (competitors.length > 10 ? `<p style="font-size:10px;color:var(--muted);margin-top:6px;font-style:italic">+${competitors.length - 10} additional systems in this market</p>` : '')
    : '<p class="empty">No competitors found.</p>';

  el.innerHTML = `
    <!-- ── Narrative summary ── -->
    <div class="sec">Market Intelligence Summary</div>
    <div class="summary-box" style="font-size:12px;line-height:1.8;margin-bottom:12px">${summary}</div>

    <!-- ── Head-to-head scoreboard ── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
      <div style="background:#f0f6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#1a56db;line-height:1">${targetCount}</div>
        <div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#1a56db;margin-top:3px">${targetKey||'Target'}</div>
        <div style="font-size:10.5px;color:var(--muted);margin-top:2px">${shareP}% market share</div>
      </div>
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#e02424;line-height:1">${totalComp}</div>
        <div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#e02424;margin-top:3px">${competitors.length} Competitors</div>
        <div style="font-size:10.5px;color:var(--muted);margin-top:2px">${compShareP}% market share</div>
      </div>
    </div>

    <!-- ── Metric cards ── -->
    <div class="sec">Key Risk Indicators</div>

    ${insightCard(
      'Market Share',
      shareP + '%',
      shareP,
      shareColor,
      (shareP >= 40
        ? `Strong position — but <strong>${compShareP}% of this market still flows through competitor networks.</strong> Protecting that share requires active care coordination.`
        : shareP >= 20
        ? `<strong>${compShareP}% of facilities in this market belong to competitors.</strong> Without a retention strategy, a meaningful share of post-acute and follow-up volume is at risk.`
        : shareP >= 10
        ? `Competitors control <strong>${compShareP}% of this market.</strong> Patients have significantly more access points outside your network — a major leakage driver.`
        : `Competitors dominate <strong>${compShareP}% of this market.</strong> This level of exposure makes uncoordinated patient leakage nearly inevitable without intervention.`)
    )}

    ${insightCard(
      'Competitive Pressure',
      pr + ':1',
      Math.min(prNum/6*100, 100),
      prColor,
      `There are <strong>${pr} competitor locations for every 1 ${targetKey||'target'} location</strong> in this area.`
      + (top ? ` <strong>${top.name}</strong> alone accounts for ${total>0?Math.round((top.count/total)*100):0}% of total facilities.` : '')
      + (prNum >= 4
          ? ` At this ratio, patients are far more likely to encounter a competitor touchpoint than a ${targetKey||'target'} one after discharge.`
          : prNum >= 2
          ? ` This level of density creates meaningful risk of patients defaulting to competitor follow-up care.`
          : prNum >= 1
          ? ` Competitor access is roughly on par with your network — follow-up leakage is a real risk.`
          : ` Your network has the density advantage — care coordination can lock in that lead.`)
    )}

    ${(function(){
      const siteRatio    = targetCount > 0 ? (totalComp / targetCount).toFixed(1) : 99;
      const leakageScore = targetCount === 0 ? 100
        : Math.min(Math.round((totalComp / targetCount) * 20), 100);
      const leakageRating =
        leakageScore >= 80 ? { label: 'Critical', color: '#e02424' } :
        leakageScore >= 60 ? { label: 'High',     color: '#e02424' } :
        leakageScore >= 35 ? { label: 'Moderate', color: '#ea580c' } :
                             { label: 'Low',       color: '#16a34a' };

      const topLeakNames = leakage.slice(0,2).map(l=>l.name).join(' and ');
      let explanation = `<strong>${siteRatio} competitor sites exist for every 1 ${targetKey||'target'} site.</strong> `;
      if (leakage.length > 0) {
        explanation += `<strong>${topLeakNames}${leakage.length > 2 ? ' and ' + (leakage.length-2) + ' others' : ''}</strong> each match or exceed your footprint — meaning patients have a full-network alternative at every stage of their care journey. `;
      }
      explanation +=
        leakageScore >= 80 ? `Without proactive outreach, the majority of discharged patients in this area are likely choosing follow-up care outside your network.` :
        leakageScore >= 60 ? `A structured post-discharge program could recapture a significant portion of patients currently defaulting to competitor networks.` :
        leakageScore >= 35 ? `Targeted care coordination at high-exposure points could meaningfully improve retention in this market.` :

    ${insightCard(
      'Post-Discharge Exposure',
      edScore + '/100',

    <!-- ── Leakage systems ── -->
    <div class="sec">Systems Exceeding Your Footprint</div>

    ${leakageRows}

    <!-- ── Full competitor breakdown ── -->
    <div class="sec">Competitor Breakdown</div>
    ${compRowsHtml}
  `;
}
