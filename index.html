function buildSysManageRows(sysNames, targetKey) {
  if (!sysNames.length) return '<p style="font-size:11px;color:var(--muted)">No systems yet.</p>';
  return sysNames.map(function(s) {
    const isCustom   = customSystemNames.includes(s);
    const isTarget   = s === targetKey;
    const isProtected = isTarget || s === 'Independent / Community';
    return '<div style="display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--border)">'
      // Editable name
      +'<input data-sys-orig="'+s.replace(/"/g,'&quot;')+'" value="'+s.replace(/"/g,'&quot;')+'" '
        +'style="flex:1;font-size:11px;padding:3px 6px;border:1px solid var(--border);'
        +'border-radius:4px;background:'+(isCustom?'#fffbeb':'var(--bg)')+';color:var(--text);'
        +(isProtected?'opacity:.6;':'')+'font-weight:'+(isTarget?'700':'400')+'" '
        +(isProtected ? 'readonly ' : '')
        +'onblur="handleSysRename(this)" '
        +'onkeydown="if(event.key===String.fromCharCode(13))this.blur()" '
        +'title="'+(isCustom?'Custom system (editable)':'From search results')+(isTarget?' — Target':'')+'"'
      +'/>'
      // Badge
      +(isTarget ? '<span style="font-size:9px;background:#dbeafe;color:#1d4ed8;padding:1px 5px;border-radius:99px;white-space:nowrap">TARGET</span>' : '')
      +(isCustom && !isTarget ? '<span style="font-size:9px;background:#fef9c3;color:#854d0e;padding:1px 5px;border-radius:99px">custom</span>' : '')
      // Remove button (only for custom, non-protected)
      +(isCustom && !isProtected
        ? '<button data-remove-sys="'+s.replace(/"/g,'&quot;')+'" onclick="removeCustomSystemUI(this.dataset.removeSys)" '
            +'style="font-size:11px;background:none;border:1px solid var(--border);border-radius:4px;'
            +'padding:1px 6px;cursor:pointer;color:var(--muted);flex-shrink:0" '
            +'title="Remove this system name">✕</button>'
        : '')
      +'</div>';
  }).join('');
}

function addCustomSystemUI() {
  const input = document.getElementById('newSysInput');
  if (!input) return;
  const name = input.value.trim();
  if (!name) return;
  if (!addCustomSystem(name)) {
    showError('That system name already exists.');
    return;
  }
  input.value = '';
  buildAssign(); // Rebuild to show new system in list and all dropdowns
}

function removeCustomSystemUI(name) {
  if (!confirm('Remove "'+name+'" from the system list? Facilities currently assigned to it will revert to auto-detection.')) return;
  removeCustomSystem(name);
  // Clear any overrides pointing at this system
  Object.keys(systemOverrides).forEach(function(fid) {
    if (systemOverrides[fid] === name) delete systemOverrides[fid];
  });
  saveOverrides();
  if (lastData && lastData.systems) rebuildFromOverrides();
  buildAssign();
}

function handleSysRename(input) {
  const oldName = input.dataset.sysOrig;
  const newName = input.value.trim();
  if (!newName || newName === oldName) { input.value = oldName; return; }
  if (!renameCustomSystem(oldName, newName)) { input.value = oldName; return; }
  input.dataset.sysOrig = newName;
  input.style.background = '#f0fdf4'; // brief green flash
  setTimeout(function(){ input.style.background = '#fffbeb'; }, 800);
  if (lastData && lastData.systems) rebuildFromOverrides();
  // Rebuild dropdowns to reflect rename
  setTimeout(function(){ buildAssign(); }, 900);
}

// ════════════════════════════════════════════════════════
//  PANEL: ASSIGN (manual system override)
// ════════════════════════════════════════════════════════
// Stores user overrides: { facilityOsmId: 'System Name' }
// Persists to localStorage so assignments survive page reloads
// ── Shared State ─────────────────────────────────────────────────────────────
// State is persisted in Azure Blob Storage and shared across all team members.
// Loaded on startup, saved on every change.

let customSystemNames = [];

var _stateSaveTimer = null;
function scheduleSaveSharedState() {
  clearTimeout(_stateSaveTimer);
  _stateSaveTimer = setTimeout(saveSharedState, 1000);
}

async function loadSharedState() {
  try {
    var res = await fetch('/api/router?action=state-load');
    if (!res.ok) { console.warn('State load HTTP ' + res.status); return; }
    var state = await res.json();
    if (state.overrides)     systemOverrides    = state.overrides;
    if (state.customSystems) customSystemNames  = state.customSystems;
    if (state.excluded)      _loadedExcluded    = state.excluded;
    console.log('Shared state loaded: ' + Object.keys(systemOverrides).length + ' overrides, '
      + customSystemNames.length + ' custom systems, '
      + (state.excluded || []).length + ' excluded');
  } catch(e) {
    console.warn('Could not load shared state: ' + e.message);
  }
}

async function saveSharedState() {
  try {
    var excluded = getExcluded();
    var state = {
      overrides:     systemOverrides,
      customSystems: customSystemNames,
      excluded:      [...excluded]
    };
    var res = await fetch('/api/router?action=state-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    if (!res.ok) console.warn('State save HTTP ' + res.status);
    else console.log('Shared state saved');
  } catch(e) {
    console.warn('Could not save shared state: ' + e.message);
  }
}

function saveCustomSystems() {
  scheduleSaveSharedState();
}

function addCustomSystem(name) {
  name = name.trim();
  if (!name) return false;
  if (customSystemNames.includes(name)) return false;
  customSystemNames.push(name);
  customSystemNames.sort();
  saveCustomSystems();
  return true;
}

function removeCustomSystem(name) {
  customSystemNames = customSystemNames.filter(function(s){ return s !== name; });
  saveCustomSystems();
}

function renameCustomSystem(oldName, newName) {
  newName = newName.trim();
  if (!newName || newName === oldName) return false;
  const idx = customSystemNames.indexOf(oldName);
  if (idx === -1) return false;
  customSystemNames[idx] = newName;
  customSystemNames.sort();
  saveCustomSystems();
  // Update any overrides pointing at the old name
  Object.keys(systemOverrides).forEach(function(fid) {
    if (systemOverrides[fid] === oldName) systemOverrides[fid] = newName;
  });
  saveOverrides();
  return true;
}
let systemOverrides = {};

function saveOverrides() {
  scheduleSaveSharedState();
}

function buildAssign() {
  const el = document.getElementById('assign');
  if (!el) return;

  if (!lastData || !lastData.systems) {
    el.innerHTML = '<p class="empty">Run a search to manage assignments.</p>';
    return;
  }

  const { systems, target } = lastData;
  const targetKey = findTargetKey(systems, target);

  // Flatten all facilities with their current bucket
  const allFacs = [];
  Object.entries(systems).forEach(function([sys, facs]) {
    facs.forEach(function(f) {
      allFacs.push({ id: f.id, name: f.tags && f.tags.name ? f.tags.name : 'Unknown', sys });
    });
  });
  allFacs.sort(function(a,b){ return a.name.localeCompare(b.name); });

  // Merge search-result systems + user-defined custom systems for dropdown
  const sysNames = [...new Set([...Object.keys(systems), ...customSystemNames])].sort();
  const overrideCount = Object.keys(systemOverrides).length;

  // Manually excluded IDs (stored in localStorage)
  const excluded = getExcluded();

  el.innerHTML =
    '<div class="sec">Manual System Assignment</div>'
    +'<p style="font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5">'
      +'Reassign facilities to the correct system, or exclude ones that don\'t belong. '
      +'<strong>Assignments persist across searches and reloads.</strong>'
    +'</p>'

    // Search bar
    +'<input id="assignSearch" placeholder="🔍  Search facilities…" oninput="filterAssignList(this.value)" '
      +'style="width:100%;margin-bottom:8px"/>'

    // Stats + reset
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<span style="font-size:10px;color:var(--muted)">'
        + allFacs.length + ' facilities · '
        + overrideCount + ' reassigned · '
        + excluded.size + ' excluded'
      +'</span>'
      +'<button onclick="clearAllOverrides()" '
        +'style="font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;padding:0">'
        +'Reset all'
      +'</button>'
    +'</div>'

    // Facility list
    +'<div id="assignList">'
    + allFacs.map(function(f) {
        const isExcluded = excluded.has(f.id);
        const isOverridden = !!systemOverrides[f.id];
        const rowStyle = isExcluded
          ? 'opacity:.45;'
          : '';
        const sysOpts = sysNames.map(function(s) {
          return '<option value="'+s+'"'+(s===f.sys?' selected':'')
            +(s===targetKey?' style="font-weight:700"':'')+'>'+s+'</option>';
        }).join('') + '<option value="__custom__">— Custom name —</option>';

        return '<div class="assign-row" data-name="'+f.name.toLowerCase()+'" '

          +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px">'
            +'<div style="font-size:11px;font-weight:600;color:var(--text);'
              +'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1" title="'+f.name+'">'+f.name+'</div>'
            +'<div style="display:flex;gap:3px;flex-shrink:0">'
              +(isOverridden ? '<span style="font-size:9px;color:#16a34a;padding-top:2px">✓</span>' : '')
              +'<button onclick="toggleExclude('+f.id+',this)" title="'+(isExcluded?'Un-exclude':'Exclude this facility')+'" '
                +'style="font-size:10px;background:none;border:1px solid var(--border);border-radius:3px;'
                +'padding:1px 5px;cursor:pointer;color:'+(isExcluded?'var(--accent)':'var(--muted)')+';">'
                +(isExcluded ? 'Un-exclude' : 'Exclude')
              +'</button>'
            +'</div>'
          +'</div>'
          +'<select data-fid="'+f.id+'" onchange="applyOverride(this)" '
            +'style="width:100%;margin-top:3px;font-size:11px;padding:3px 5px;'
            +'border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text)">'
            +sysOpts
          +'</select>'
          +'</div>';
      }).join('')

async function addManualFacility() {
  var name   = document.getElementById('manualFacName').value.trim();
  var addr   = document.getElementById('manualFacAddr')   ? document.getElementById('manualFacAddr').value.trim()   : '';
  var city   = document.getElementById('manualFacCity')   ? document.getElementById('manualFacCity').value.trim()   : '';
  var state  = document.getElementById('manualFacState')  ? document.getElementById('manualFacState').value.trim().toUpperCase() : '';
  var zip    = document.getElementById('manualFacZip')    ? document.getElementById('manualFacZip').value.trim()    : '';
  var system = document.getElementById('manualFacSystem') ? document.getElementById('manualFacSystem').value.trim() : '';

  if (!name) { showError('Facility name is required.'); return; }
  if (!addr && !city && !zip) { showError('Enter at least a street address or city/ZIP.'); return; }

  var btn    = document.getElementById('manualAddBtn');
  var status = document.getElementById('manualAddStatus');
  if (btn) btn.disabled = true;
  if (status) status.textContent = 'Geocoding address…';

  try {
    // Geocode the address
    var coords = await geocodeAddress(addr, city, state, zip);
    if (!coords) {
      // Try with less specificity
      coords = await geocodeAddress('', city, state, zip);
    }
    if (!coords) {
      if (status) status.textContent = '✗ Could not geocode address. Check the address and try again.';
      if (btn) btn.disabled = false;
      return;
    }

    var facId = 'manual_' + Date.now();
    var fac = {
      id:   facId,
      type: 'manual',
      lat:  coords.lat,
      lon:  coords.lon,
      tags: {
        name:    name,
        address: addr,
        city:    city,
        state:   state,
        postcode:zip
      }
    };

    // Store in persisted manual list
    var entry = { id: facId, name, addr, city, state, zip, system, lat: coords.lat, lon: coords.lon };
    manualFacilities.push(entry);
    try { localStorage.setItem('cpiq_manual_facs', JSON.stringify(manualFacilities)); } catch(e) {}

    // If system specified, apply as override; else auto-detect from groupBySystem
    if (system) {
      systemOverrides[facId] = system;
      saveOverrides();
    }

    // Add to rawFacilities and rebuild map
    if (lastData && lastData.rawFacilities) {
      lastData.rawFacilities.push(fac);
      rebuildFromOverrides();
    }

    // Clear form
    ['manualFacName','manualFacAddr','manualFacCity','manualFacState','manualFacZip','manualFacSystem']
      .forEach(function(id){ var el = document.getElementById(id); if(el) el.value = ''; });
    if (status) status.textContent = '✓ Added: ' + name + ' (' + coords.lat.toFixed(4) + ', ' + coords.lon.toFixed(4) + ')';
    if (btn) btn.disabled = false;

  } catch(e) {
    if (status) status.textContent = '✗ Error: ' + e.message;
    if (btn) btn.disabled = false;
  }
}

// Column name aliases — maps common header variations to our standard fields
var COL_ALIASES = {
  name:    ['name','displayname','display name','facility','facility name',
            'provider','provider name','practice','location','site','hospital','clinic',
            'organizationname','organization name','legalname','legal name'],
  lat:     ['lat','latitude','lat_dd','y','latitude_dd'],
  lon:     ['lon','lng','longitude','long','lon_dd','x','longitude_dd'],
  system:  ['system','health system','parent system','organization','org','network','group'],
  address: ['address','street','addr','street address','address1','address_1'],
  city:    ['city','city name'],
  state:   ['state','st','state_cd','state code'],
  zip:     ['zip','zipcode','zip code','postal','postal code','postcode'],
  type:    ['type','facility type','provider type','category']
};

// findCol normalises spaces/case so 'DisplayName' matches 'displayname'


function findCol(headers, field) {
  var aliases = COL_ALIASES[field] || [];
  for (var i = 0; i < headers.length; i++) {
    var h = headers[i].toString().toLowerCase().trim();
    if (aliases.indexOf(h) >= 0) return headers[i];
  }
  return null;
}

async function importExcelFacilities(input) {
  var file = input.files[0];
  if (!file) return;
  var status = document.getElementById('excelImportStatus');
  if (status) status.textContent = 'Reading file…';

  try {
    // Check SheetJS is loaded
    if (typeof XLSX === 'undefined') {
      if (status) status.textContent = '✗ SheetJS library not loaded. Check internet connection.';
      return;
    }

    var arrayBuffer = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload  = function(e){ resolve(e.target.result); };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });

    var workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
    var sheet    = workbook.Sheets[workbook.SheetNames[0]];
    var rows     = XLSX.utils.sheet_to_json(sheet, { defval: '' });

    if (!rows.length) { if (status) status.textContent = '✗ No data found in file.'; return; }

    // Detect columns
    var headers = Object.keys(rows[0]);
    var colName  = findCol(headers, 'name');
    var colLat   = findCol(headers, 'lat');
    var colLon   = findCol(headers, 'lon');
    var colSys   = findCol(headers, 'system');
    var colAddr  = findCol(headers, 'address');
    var colCity  = findCol(headers, 'city');
    var colState = findCol(headers, 'state');
    var colZip   = findCol(headers, 'zip');

    if (!colName) { if (status) status.textContent = '✗ No "Name" column found. Headers: ' + headers.slice(0,6).join(', '); return; }
    var hasCoords = !!(colLat && colLon);
    if (status) status.textContent = 'Processing ' + rows.length.toLocaleString() + ' rows' + (hasCoords ? ' (using lat/lon)' : ' (will geocode — may be slow)') + '…';

    // Process rows
    var newFacs = [];
    var skipped = 0;
    var needsGeocode = [];

    for (var i = 0; i < rows.length; i++) {
      var row  = rows[i];
      var name = colName ? String(row[colName] || '').trim() : '';
      if (!name) { skipped++; continue; }

      var lat = colLat ? parseFloat(row[colLat]) : NaN;
      var lon = colLon ? parseFloat(row[colLon]) : NaN;
      var sys  = colSys   ? String(row[colSys]   || '').trim() : '';
      var addr = colAddr  ? String(row[colAddr]  || '').trim() : '';
      var city = colCity  ? String(row[colCity]  || '').trim() : '';
      var st   = colState ? String(row[colState] || '').trim() : '';
      var zip  = colZip   ? String(row[colZip]   || '').trim() : '';

      var fac = {
        id:    'excel_' + i + '_' + Date.now(),
        type:  'excel',
        lat:   isNaN(lat) ? null : lat,
        lon:   isNaN(lon) ? null : lon,
        tags:  { name, address: addr, city, state: st, postcode: zip }
      };

      if (sys) systemOverrides[fac.id] = sys;

      if (!isNaN(lat) && !isNaN(lon)) {
        newFacs.push(fac);
      } else if (addr || city || zip) {
        needsGeocode.push({ fac, addr, city, st, zip });
      } else {
        skipped++;
      }
    }

    // Geocode rows without coordinates — capped at 500 for browser performance.
    // If your file has lat/lon already this block is skipped entirely.
    var toGeocode = needsGeocode.slice(0, 500);
    if (toGeocode.length > 0) {
      if (status) status.textContent = 'Geocoding ' + toGeocode.length + ' rows without coordinates…';
      for (var g = 0; g < toGeocode.length; g += 10) {
        var gBatch = toGeocode.slice(g, g + 10);
        var gRes = await Promise.all(gBatch.map(function(item) {
          return geocodeAddress(item.addr, item.city, item.st, item.zip)
            .then(function(coords) {
              if (coords) { item.fac.lat = coords.lat; item.fac.lon = coords.lon; }
              return item.fac;
            });
        }));
        gRes.forEach(function(f){ if (f.lat) newFacs.push(f); else skipped++; });
        if (g + 10 < toGeocode.length) await new Promise(function(r){ setTimeout(r, 150); });
        if (status) status.textContent = 'Geocoding ' + Math.min(g+10, toGeocode.length) + '/' + toGeocode.length + '…';
      }
      skipped += needsGeocode.length - toGeocode.length; // cap remainder
    }

    // Save and apply
    excelFacilities = excelFacilities.concat(newFacs);
    saveExcelFacilities();
    saveOverrides();

    // Apply to current search if one has been run
    if (lastData && lastData.rawFacilities) {
      // Deduplicate by name+proximity against existing
      var toAdd = newFacs.filter(function(ef) {
        return !lastData.rawFacilities.some(function(ex) {
          if (!ex.lat || !ef.lat) return false;
          var sameName = (ex.tags&&ex.tags.name||'').toLowerCase() === ef.tags.name.toLowerCase();
          return sameName && haversineMeters(ef.lat, ef.lon, ex.lat, ex.lon) < 200;
        });
      });
      lastData.rawFacilities = lastData.rawFacilities.concat(toAdd);
      rebuildFromOverrides();
      if (status) status.textContent = '✓ Imported ' + newFacs.length.toLocaleString() + ' locations (' + toAdd.length + ' new on map, ' + skipped + ' skipped). Persisted for future searches.';
    } else {
      if (status) status.textContent = '✓ Imported ' + newFacs.length.toLocaleString() + ' locations (run a search to show them). ' + skipped + ' rows skipped.';
    }

    input.value = ''; // reset file input
    buildAssign();    // refresh assign panel counts

  } catch(e) {
    if (status) status.textContent = '✗ Import error: ' + e.message;
    console.error('Excel import error:', e);
  }
}

// Load persisted Excel facilities into rawFacilities on each search.
// Critically: only adds facilities within the current search radius so we never
// load all 130k+ rows into the browser at once — only the local subset.
function applyExcelFacilities(rawFacilities, centerLat, centerLon, radiusMeters, selectedTypes) {
  // Merge embedded locations — pass selected types so we only get relevant ones
  var embedded = (typeof getEmbeddedFacilities === 'function') ? getEmbeddedFacilities(selectedTypes) : [];
  embedded.forEach(function(ef) {
    if (ef._embeddedSystem && !systemOverrides[ef.id]) systemOverrides[ef.id] = ef._embeddedSystem;
  });
  var importedOnly = excelFacilities.filter(function(ef) {
    return !embedded.some(function(em) {
      return em.tags.name.toLowerCase() === (ef.tags&&ef.tags.name||'').toLowerCase()
          && haversineMeters(em.lat, em.lon, ef.lat||0, ef.lon||0) < 300;
    });
  });
  var allExcel = embedded.concat(importedOnly);
  if (!allExcel.length) return rawFacilities;

  var existing = rawFacilities;
  // *** Use allExcel (embedded + imported) NOT just excelFacilities ***
  var inRadius = allExcel.filter(function(ef) {
    if (!ef.lat || !ef.lon) return false;
    if (!centerLat || !centerLon) return true;
    return haversineMeters(centerLat, centerLon, ef.lat, ef.lon) <= (radiusMeters || 40000);
  });

  var toAdd = inRadius.filter(function(ef) {
    // Deduplicate against existing results by name + proximity
    return !existing.some(function(ex) {
      var exLat = ex.lat || (ex.center && ex.center.lat);
      var exLon = ex.lon || (ex.center && ex.center.lon);
      if (!exLat) return false;
      var sameName = (ex.tags&&ex.tags.name||'').toLowerCase().slice(0,20) ===
                     (ef.tags&&ef.tags.name||'').toLowerCase().slice(0,20);
      return sameName && haversineMeters(ef.lat, ef.lon, exLat, exLon) < 300;
    });
  });

  console.log('Excel: ' + allExcel.length.toLocaleString() + ' total | '
    + inRadius.length + ' in radius | ' + toAdd.length + ' new (not in OSM/NPI/CMS)');
  return existing.concat(toAdd);
}

function applyOverride(select) {
  const fid   = parseInt(select.dataset.fid);
  let newSys  = select.value;

  if (newSys === '__custom__') {
    const custom = prompt('Enter the system name to assign this facility to:');
    if (!custom || !custom.trim()) { select.value = select.dataset.prev || ''; return; }
    newSys = custom.trim();
  }
  select.dataset.prev = newSys;

  // Store override and rebuild grouping from scratch
  systemOverrides[fid] = newSys;
  saveOverrides();
  rebuildFromOverrides();
}

function clearAllOverrides() {
  Object.keys(systemOverrides).forEach(k => delete systemOverrides[k]);
  saveOverrides();
  rebuildFromOverrides();
}

function rebuildFromOverrides() {
  if (!lastData || !lastData.rawFacilities) return;

  const excluded = getExcluded();

  // Re-group using raw facilities, filtering out excluded ones
  const activeFacs = lastData.rawFacilities.filter(function(f) {
    return !excluded.has(f.id) && !excluded.has(String(f.id));
  });

  const newSystems = groupBySystem(activeFacs, lastData.target);

  // Apply overrides on top
  Object.entries(systemOverrides).forEach(function([fidStr, newSys]) {
    const fid = isNaN(parseInt(fidStr)) ? fidStr : parseInt(fidStr);
    // Remove from current bucket
    Object.entries(newSystems).forEach(function([sys, facs]) {
      const idx = facs.findIndex(function(f){ return f.id === fid; });
      if (idx !== -1) {
        facs.splice(idx, 1);
        if (facs.length === 0) delete newSystems[sys];
      }
    });
    // Add to new bucket
    const fac = lastData.rawFacilities.find(function(f){ return f.id === fid; });
    if (fac && !excluded.has(fac.id) && !excluded.has(String(fac.id))) {
      if (!newSystems[newSys]) newSystems[newSys] = [];
      newSystems[newSys].push(fac);
    }
  });

  lastData.systems = newSystems;
  resetColors();
  const targetKey = findTargetKey(newSystems, lastData.target);
  buildLegend(newSystems, targetKey);
  drawMarkers(newSystems, targetKey);
  buildInsights();
  buildAccount();
  buildAssign();
  buildCompFilterBar(newSystems, targetKey);
  // Re-apply any active filter after rebuild
  if (compFilterActive.size > 0 || compFocusModeOn) applyCompFilter();
}

function buildAccount() {
  const { systems, target } = lastData;
  const el = document.getElementById('account');
  const targetKey = findTargetKey(systems, target);
  const facilities = targetKey ? systems[targetKey] : [];
  const count = facilities.length;
  const allCounts = Object.values(systems).map(v=>v.length).sort((a,b)=>b-a);
  const rank = allCounts.indexOf(count)+1;
  const total = allCounts.reduce((a,v)=>a+v,0);
  const share = total>0?Math.round((count/total)*100):0;
  const position = count>=10?'Dominant':count>=5?'Strong':count>=2?'Moderate':'Minimal';
  const names = facilities.map(h=>h.tags?.name).filter(Boolean).sort();

  el.innerHTML = `
    <div class="sec">Target Profile</div>
    <div class="row"><span class="lbl">System</span><span class="val" style="font-size:11px">${targetKey||target}</span></div>
    <div class="row"><span class="lbl">Facilities in Area</span><span class="val">${count}</span></div>
    <div class="row"><span class="lbl">Market Share</span><span class="val">${share}%</span></div>
    <div class="row"><span class="lbl">Market Rank</span><span class="val">#${rank}</span></div>
    <div class="row"><span class="lbl">Position</span><span class="val">${position}</span></div>
    ${names.length?`
      <div class="sec">Identified Facilities (${names.length})</div>
      ${names.map(n=>`<div class="row"><span class="lbl">${n}</span></div>`).join('')}
    `:'<p class="empty" style="margin-top:10px">No named facilities found for this system.</p>'}
  `;
}

  const ftype = getSelectedFtypes();
  if (!ftype.length) { showError('Please select at least one facility type.'); return; }

  if (!zip)    { showError('Please enter a ZIP code.'); return; }
  if (!target) { showError('Please enter a target system name.'); return; }

  resetColors();

  const btn    = document.getElementById('runBtn');
  const loader = document.getElementById('loader');
  btn.disabled = true;
  loader.classList.add('visible');

  try {
    let coords;
    try { coords = await getCoords(zip); }
    catch(e) { throw new Error('Geocoding service unreachable. (' + e.message + ')'); }
    if (!coords) throw new Error(`ZIP "${zip}" not found.`);

    let facilities;
    try { facilities = await getFacilities(coords.lat, coords.lon, radius, ftype); }
    catch(e) { throw new Error('Hospital data service unreachable. (' + e.message + ')'); }

    // Apply embedded locations first, then check if anything exists
    facilities = applyExcelFacilities(facilities, coords.lat, coords.lon, radius, ftype);

    if (!facilities.length) {
      showError('No facilities found. Try a larger radius or different facility type.');
      return;
    }
    const systems = groupBySystem(facilities, target);
    const targetKey = findTargetKey(systems, target);
    lastData = { systems, target, rawFacilities: facilities };

    mapInstance.setView([coords.lat, coords.lon], 11);
    buildLegend(systems, targetKey);
    drawMarkers(systems, targetKey);
    buildInsights();
    buildAccount();
    buildAssign();
    compFilterActive.clear();
    compFocusModeOn = false;
    buildCompFilterBar(systems, targetKey);
    switchTab('insights');
    document.getElementById('exportBtn').style.display = 'inline-block';

  } catch(err) {
    showError(err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    loader.classList.remove('visible');
  }
}

// ── Helper: load a script dynamically and resolve when ready ─────────────────
// ── Collect insights data ────────────────────────────────────────────────────
function collectInsights() {
  var systems     = lastData.systems;
  var target      = lastData.target;
  var targetKey   = findTargetKey(systems, target);
  var targetFacs  = targetKey ? systems[targetKey] : [];
  var targetCount = targetFacs.length;
  var total       = Object.values(systems).reduce(function(a,v){return a+v.length;},0);
  var shareP      = total>0 ? Math.round((targetCount/total)*100) : 0;
  var competitors = Object.entries(systems)
    .filter(function(e){return e[0]!==targetKey;})
    .map(function(e){return {name:e[0],count:e[1].length};})
    .sort(function(a,b){return b.count-a.count;});
  var totalComp   = competitors.reduce(function(a,c){return a+c.count;},0);
  var pr          = pressureRatio(targetCount, totalComp);
  var allCompFacs = Object.entries(systems).filter(function(e){return e[0]!==targetKey;}).flatMap(function(e){return e[1];});
  var edScore     = edExposure(allCompFacs, Object.values(systems).flat());
  var edRating    = ratingLabel(edScore).label;
  var leakage     = competitors.filter(function(c){return c.count>=targetCount;});
  var allCounts   = Object.values(systems).map(function(v){return v.length;}).sort(function(a,b){return b-a;});
  var rank        = allCounts.indexOf(targetCount)+1;
  var position    = targetCount>=10?'Dominant':targetCount>=5?'Strong':targetCount>=2?'Moderate':'Minimal';
  var summary     = generateSummary(targetKey, targetCount, total, shareP, pr, edScore, competitors, leakage);
  var zipVal      = document.getElementById('zipInput').value.trim();
  var radiusEl    = document.getElementById('radiusSelect');
  var radiusLbl   = radiusEl.options[radiusEl.selectedIndex].text;
  var dateStr     = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  return { systems, target, targetKey, targetCount, total, shareP, competitors, pr,
           edScore, edRating, leakage, rank, position, summary, zipVal, radiusLbl, dateStr };
}

// ════════════════════════════════════════════════════════
//  COMPETITOR FILTER / FOCUS  (compact dropdown)
// ════════════════════════════════════════════════════════
var compFilterActive = new Set();  // names currently checked in the dropdown
var compFocusModeOn  = false;      // focus checkbox state

// ── Open / close the dropdown ──────────────────────────────────────────────
function toggleCompFilterMenu(e) {
  e.stopPropagation();
  var menu = document.getElementById('compFilterMenu');
  var btn  = document.getElementById('compFilterBtn');
  if (!menu) return;
  var isOpen = menu.classList.contains('open');
  if (isOpen) {
    menu.classList.remove('open');
  } else {
    var rect = btn.getBoundingClientRect();
    menu.style.top  = (rect.bottom + 4) + 'px';
    menu.style.left = rect.left + 'px';
    menu.classList.add('open');
  }
}
document.addEventListener('click', function(e) {
  var menu = document.getElementById('compFilterMenu');
  var btn  = document.getElementById('compFilterBtn');
  if (menu && !menu.contains(e.target) && e.target !== btn && !(btn && btn.contains(e.target))) {
    menu.classList.remove('open');
  }
});

// ── Build / rebuild the dropdown items ────────────────────────────────────
function buildCompFilterBar(systems, targetKey) {
  var wrap = document.getElementById('compFilterWrap');
  var items = document.getElementById('compFilterItems');
  if (!wrap || !items) return;

  var sysEntries = Object.entries(systems)
    .filter(function(e){ return e[0] !== targetKey && e[0] !== 'Independent / Community'; })
    .sort(function(a,b){ return b[1].length - a[1].length; });

  if (!sysEntries.length) { wrap.style.display = 'none'; return; }

  // Remove any systems from active set that no longer exist
  compFilterActive.forEach(function(s) {
    if (!systems[s]) compFilterActive.delete(s);
  });

  items.innerHTML = sysEntries.map(function(e) {
    var sys   = e[0];
    var count = e[1].length;
    var color = getColor(sys, targetKey);
    var checked = compFilterActive.has(sys);
    return '<div class="cfilter-item">'
      + '<label>'
      + '<input type="checkbox" value="' + sys.replace(/"/g,'&quot;') + '" '
        + (checked ? 'checked ' : '')
        + 'onchange="onCompFilterChange(this)"/>'
      + '<span class="cfilter-swatch" style="background:' + color + '"></span>'
      + sys
      + '<span class="cfilter-count">' + count + '</span>'
      + '</label>'
      + '</div>';
  }).join('');

  // Sync focus checkbox
  var focusChk = document.getElementById('compFocusChk');
  if (focusChk) focusChk.checked = compFocusModeOn;

  wrap.style.display = '';
  updateCompFilterSummary();
}

function onCompFilterChange(chk) {
  var sys = chk.value;
  if (chk.checked) compFilterActive.add(sys);
  else             compFilterActive.delete(sys);
  updateCompFilterSummary();
  applyCompFilter();
}

function onFocusChkChange(chk) {
  compFocusModeOn = chk.checked;
  applyCompFilter();
}

function setAllCompFilter(checked) {
  compFilterActive.clear();
  document.querySelectorAll('#compFilterItems input[type=checkbox]').forEach(function(chk) {
    chk.checked = checked;
    if (checked) compFilterActive.add(chk.value);
  });
  updateCompFilterSummary();
  applyCompFilter();
}

function clearCompFilter() {
  setAllCompFilter(false);
  compFocusModeOn = false;
  var focusChk = document.getElementById('compFocusChk');
  if (focusChk) focusChk.checked = false;
}

function updateCompFilterSummary() {
  var el  = document.getElementById('compFilterSummary');
  var btn = document.getElementById('compFilterBtn');
  if (!el) return;
  var n = compFilterActive.size;
  if (n === 0) {
    el.textContent = 'All Competitors';
    btn && btn.classList.remove('has-filter');
  } else if (n === 1) {
    el.textContent = [...compFilterActive][0].split(' ').slice(0,2).join(' ');
    btn && btn.classList.add('has-filter');
  } else {
    el.textContent = n + ' systems';
    btn && btn.classList.add('has-filter');
  }
}

// applyCompFilter: dims/hides markers based on current filter state.
// Does NOT re-query or re-group — operates purely on the existing marker layer.
function applyCompFilter() {
  if (!lastData || !lastData.systems) return;
  var targetKey = findTargetKey(lastData.systems, lastData.target);
  var hasFilter = compFilterActive.size > 0;

  markers.forEach(function(marker) {
    var sys = marker._cpiqSys;
    if (!sys) return;

    var isTarget = sys === targetKey;
    var isSelected = compFilterActive.has(sys);

    if (!hasFilter) {
      // No filter — show everything normally
      marker.setOpacity(1);
      marker.getElement && marker.getElement() && (marker.getElement().style.filter = '');
    } else if (isTarget) {
      // Target always fully visible
      marker.setOpacity(1);
      marker.getElement && marker.getElement() && (marker.getElement().style.filter = '');
    } else if (isSelected) {
      // Selected competitor — highlight
      marker.setOpacity(1);
      marker.getElement && marker.getElement() && (marker.getElement().style.filter = 'drop-shadow(0 0 4px rgba(22,73,201,.6))');
    } else {
      // Not selected
      if (compFocusModeOn) {
        marker.setOpacity(0);  // hide entirely
      } else {
        marker.setOpacity(0.15);  // dim
        marker.getElement && marker.getElement() && (marker.getElement().style.filter = 'grayscale(1)');
      }
    }
  });

  // Update insights panel to reflect filtered view if focus mode is on
  if (compFocusModeOn && hasFilter) {
    buildInsightsFiltered(targetKey);
  } else {
    buildInsights();
  }
}

// Build insights panel scoped to selected competitors only (focus mode)
function buildInsightsFiltered(targetKey) {
  if (!lastData || !lastData.systems) return;
  var systems = lastData.systems;

  // Build a filtered systems view: target + selected competitors only
  var filteredSystems = {};
  filteredSystems[targetKey] = systems[targetKey] || [];
  compFilterActive.forEach(function(sys) {
    if (systems[sys]) filteredSystems[sys] = systems[sys];
  });

  // Temporarily swap lastData.systems for buildInsights rendering, then restore
  var origSystems = lastData.systems;
  lastData.systems = filteredSystems;
  buildInsights();
  lastData.systems = origSystems;

  // Add a banner to the top of insights noting the filtered view
  var insightsEl = document.getElementById('insights');
  if (insightsEl) {
    var banner = '<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:6px;'
      + 'padding:7px 10px;margin-bottom:10px;font-size:11px;color:#92400e;font-weight:600">'
      + '⊙ Focus Mode: showing ' + compFilterActive.size + ' selected competitor'
      + (compFilterActive.size > 1 ? 's' : '') + ' vs. target'
      + '</div>';
    insightsEl.innerHTML = banner + insightsEl.innerHTML;
  }
}

// ════════════════════════════════════════════════════════
//  BOOTSTRAP
// ════════════════════════════════════════════════════════
function bootstrap() {
  if (typeof L === 'undefined') {
    showError('Leaflet failed to load. Check internet connection and refresh.');
    return;
  }
  initMap();

  // Load QHIN data and shared state in the background
  loadQHINData();
  loadSharedState();

  // ── Debounced redraw helpers ────────────────────────────────────────────
  // All pin controls use a 120ms debounce — updates the label immediately
  // but only redraws the map after the user stops interacting.
  // This prevents crashes when dragging over hundreds of markers.
  var _pinRedrawTimer = null;
  function schedulePinRedraw(resetPalette) {
    clearTimeout(_pinRedrawTimer);
    _pinRedrawTimer = setTimeout(function() {
      if (!lastData || !lastData.systems) return;
      _pinIconCache = {}; // clear icon cache so new color/size takes effect
      if (resetPalette) resetColors();
      var targetKey = findTargetKey(lastData.systems, lastData.target);
      if (resetPalette) buildLegend(lastData.systems, targetKey);
      drawMarkers(lastData.systems, targetKey);
    }, 120);
  }

  // Pin size slider
  document.getElementById('targetPinSize').addEventListener('input', function() {
    document.getElementById('targetPinSizeVal').textContent = this.value;
    schedulePinRedraw(false);
  });

  // Target color
  document.getElementById('targetColor').addEventListener('input', function() {
    schedulePinRedraw(true);
  });

  // Independent color
  document.getElementById('independentColor').addEventListener('input', function() {
    schedulePinRedraw(false);
  });

  // No auto-run — user initiates search manually
}







if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootstrap);
} else {
  bootstrap();
}






</script>
